<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Timer</title>
<link rel="manifest" href="manifest.json">
<style>
:root {
  --bg: #ffffff;
  --text: #000000;
  --accent: #007aff;
}

body.dark {
  --bg: #121212;
  --text: #ffffff;
}

body {
  font-family: Arial;
  text-align: center;
  padding: 20px;
  background: var(--bg);
  color: var(--text);
}

h1 { font-size: 1.8em; }
.timer { font-size: 3em; margin: 20px; }
.exercise { font-size: 1.4em; margin: 10px; }

button {
  padding: 10px 20px;
  font-size: 1em;
  margin: 5px;
}

.progress {
  width: 100%;
  height: 10px;
  background: #ccc;
  margin-top: 20px;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: var(--accent);
}
</style>
</head>
<body>

<h1>Warm-Up Timer</h1>

<div class="exercise" id="exercise">Ready</div>
<div class="timer" id="timer">00:30</div>
<div id="totalTime">Total: 00:00</div>

<div class="progress">
  <div class="progress-bar" id="progressBar"></div>
</div>

<button onclick="start()">Start</button>
<button onclick="pause()">Pause</button>
<button onclick="resume()">Resume</button>
<button onclick="toggleDark()">Toggle Dark Mode</button>

<script>
const workout = [
  { name: "Jumping Jacks", time: 30 },
  { name: "High Knees", time: 30 },
  { name: "Torso Twists + Arm Circles", time: 30 },
  { name: "Bodyweight Squats", time: 30 }
];

let index = 0;
let timeLeft = workout[0].time;
let totalElapsed = 0;
let totalDuration = workout.reduce((sum, ex) => sum + ex.time, 0);
let interval;

function beep() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(800, ctx.currentTime);
  osc.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + 0.2);

  if (navigator.vibrate) navigator.vibrate(200);
}

function update() {
  document.getElementById("exercise").innerText = workout[index].name;
  document.getElementById("timer").innerText =
    `00:${String(timeLeft).padStart(2, '0')}`;

  document.getElementById("totalTime").innerText =
    `Total: 00:${String(totalElapsed).padStart(2, '0')}`;

  let progress = (totalElapsed / totalDuration) * 100;
  document.getElementById("progressBar").style.width = progress + "%";
}

function start() {
  if (interval) return;
  update();
  interval = setInterval(tick, 1000);
}

function tick() {
  timeLeft--;
  totalElapsed++;

  if (timeLeft <= 0) {
    beep();
    index++;
    if (index >= workout.length) {
      clearInterval(interval);
      document.getElementById("exercise").innerText = "Done!";
      return;
    }
    timeLeft = workout[index].time;
  }

  update();
}

function pause() {
  clearInterval(interval);
  interval = null;
}

function resume() {
  if (!interval) interval = setInterval(tick, 1000);
}

function toggleDark() {
  document.body.classList.toggle("dark");
}
</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
