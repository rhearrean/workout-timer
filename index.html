<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Fit Timer</title>
  <meta name="theme-color" content="#111111" />

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="stylesheet" href="style.css" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Fit Timer" />
</head>
<body>
  <main class="container">
    <header class="app-header">
      <h1>Fit Timer</h1>
      <span class="version-badge">v3.5</span>
    </header>

    <section id="workoutPage" class="page-view">
      <section id="completedScreen" class="completed-screen" style="display:none;">
        <div class="completed-icon">✅</div>
        <h2>All done today</h2>
        <p>Abs Circuit and Pushups are complete. Nothing else to do today.</p>
      </section>

      <section class="workout-controls app-section">
        <div class="workout-picker-row">
          <select id="workoutSelect" aria-label="Choose workout">
            <option value="abs">Abs Circuit</option>
            <option value="pushups">Pushup Sets</option>
          </select>

          <button id="settingsBtn" class="icon-btn" aria-label="Open settings" title="Settings">⚙️</button>
        </div>

        <div id="selectedWorkoutSummary" class="selected-workout-summary" aria-live="polite">
          3 rounds · 40s work / 20s rest
        </div>
      </section>

      <section id="dailyStatus" class="status-badges app-section" aria-label="Today's workout status">
        <div id="absStatus" class="status-badge">Abs —</div>
        <div id="pushupStatus" class="status-badge">Pushups —</div>
      </section>

      <section class="timer-card app-section">
        <div id="phase">Ready</div>
        <div id="exercise">Press Start</div>
        <div id="nextExercise"></div>
        <div id="timer">0</div>
      </section>

      <section class="button-row app-section">
        <button id="startBtn">Start</button>
        <button id="completeSetBtn" style="display:none;">Complete Set</button>
        <button id="resetBtn" class="secondary-btn">Reset</button>
      </section>
    </section>

    <section id="settingsPage" class="page-view settings-page" style="display:none;">
      <section class="settings-panel">
        <h2>Settings</h2>

        <label for="pushupRestSelect">Pushup Rest</label>
        <select id="pushupRestSelect">
          <option value="60">60 seconds</option>
          <option value="90">90 seconds</option>
        </select>

        <label for="absRoundsSelect">Ab Circuit Rounds</label>
        <select id="absRoundsSelect">
          <option value="1">1 round</option>
          <option value="2">2 rounds</option>
          <option value="3">3 rounds</option>
          <option value="4">4 rounds</option>
          <option value="5">5 rounds</option>
        </select>

        <button id="closeSettingsBtn" class="secondary-btn">Back to Workout</button>
      </section>
    </section>
  </main>

  <script src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js");
    }
  </script>
</body>
</html>
