<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Timer</title>
<link rel="manifest" href="manifest.json">

<style>
:root { --bg:#121212; --text:#fff; --accent:#007aff; }
body.light { --bg:#fff; --text:#000; }

body {
  font-family: Arial;
  text-align:center;
  padding:20px;
  background:var(--bg);
  color:var(--text);
}

.timer { font-size:3em; margin:20px; }
button { padding:10px 20px; margin:5px; }
</style>
</head>

<body>

<h1>My Workout Routine</h1>

<div id="phaseLabel">READY</div>
<div id="exercise">Ready</div>

<div class="timer" id="timer">00:00</div>

<div id="totalTime">Total: 00:00</div>

<button onclick="start()">Start</button>
<button onclick="togglePause()">Pause</button>

<script>

/* =========================
   DATA
========================= */

const AUDIO_DELAY = 3000; // 🔥 CRITICAL: matches your built-in countdown

const warmup = [
  { name:"Jumping Jacks", key:"jj", time:30 },
  { name:"High Knees", key:"knees", time:30 },
  { name:"Torso Twists + Arm Circles", key:"twists", time:30 },
  { name:"Bodyweight Squats", key:"squats", time:30 }
];

const workout = {
  rounds: 3,
  exercises: [
    { name:"Plank Taps", key:"plank_taps", time:40 }
  ],
  rest: 20
};

/* =========================
   STATE
========================= */

let mode = "idle";
let index = 0;
let round = 1;

let running = false;
let paused = false;

let phaseStart = 0;
let phaseDuration = 0;

let workoutStart = 0;

let interval = null;

/* =========================
   AUDIO
========================= */

const audioPool = {};

const sounds = {
  start:"audio/start.wav",
  complete:"audio/complete.wav",
  halfway:"audio/halfway.wav",
  tick:"audio/tick.wav",

  jj_intro:"audio/jj_intro.wav",
  knees_intro:"audio/knees_intro.wav",
  twists_intro:"audio/twists_intro.wav",
  squats_intro:"audio/squats_intro.wav",
  plank_taps_intro:"audio/plank_taps_intro.wav",

  one:"audio/1.wav",
  two:"audio/2.wav",
  three:"audio/3.wav",
  four:"audio/4.wav",
  five:"audio/5.wav"
};

function initAudio(){
  Object.entries(sounds).forEach(([k,s])=>{
    audioPool[k] = new Audio(s);
  });
}

function playSound(k){
  const a = audioPool[k];
  if(!a) return;
  a.pause();
  a.currentTime = 0;
  a.play().catch(()=>{});
}

/* =========================
   START
========================= */

function start(){

  if(running){
    stop();
    return;
  }

  if(Object.keys(audioPool).length === 0)
    initAudio();

  running = true;

  index = 0;
  round = 1;
  mode = "warmup";

  workoutStart = Date.now();

  document.getElementById("phaseLabel").innerText = "GET READY";
  document.getElementById("exercise").innerText = "";

  setTimeout(()=>{

    playSound("start");

    setTimeout(()=>{

      run531Countdown();

    }, 900);

  }, 700);
}

/* =========================
   5–3–1 COUNTDOWN
========================= */

function run531Countdown(){

  const steps = [
    { num:5, sound:"five" },
    { num:4, sound:"four" },
    { num:3, sound:"three" },
    { num:2, sound:"two" },
    { num:1, sound:"one" }
  ];

  let i = 0;

  const timer = setInterval(()=>{

    const step = steps[i];

    if(step){
      document.getElementById("timer").innerText =
        `00:0${step.num}`;

      playSound(step.sound);
    }

    i++;

    if(i > steps.length){

      clearInterval(timer);

      startWarmup();

      interval = setInterval(tick, 100);
    }

  }, 1000);
}

/* =========================
   CORE FIX: SYNCHED START
========================= */

function startPhase(item){

  playSound(item.key + "_intro");

  /* 🔥 CRITICAL FIX:
     WAIT FOR AUDIO (INCLUDING YOUR BUILT-IN 3s COUNTDOWN)
  */
  setTimeout(()=>{

    phaseStart = Date.now();
    phaseDuration = item.time * 1000;

  }, AUDIO_DELAY);
}

/* =========================
   FLOW
========================= */

function startWarmup(){
  mode = "warmup";
  startPhase(warmup[index]);
}

function startWorkout(){
  mode = "workout";
  startPhase(workout.exercises[0]);
}

/* =========================
   LOOP
========================= */

function tick(){

  if(!running || paused) return;

  const now = Date.now();
  const remaining = phaseDuration - (now - phaseStart);

  const t = Math.max(0, Math.ceil(remaining/1000));

  document.getElementById("timer").innerText =
    `00:${String(t).padStart(2,'0')}`;

  if(mode === "warmup"){

    document.getElementById("phaseLabel").innerText = "WARMUP";
    document.getElementById("exercise").innerText = warmup[index].name;

    if(remaining <= 0){

      index++;

      if(index >= warmup.length){
        startWorkout();
        return;
      }

      startPhase(warmup[index]);
    }
  }

  else if(mode === "workout"){

    const ex = workout.exercises[0];

    document.getElementById("phaseLabel").innerText =
      `WORKOUT - ROUND ${round}`;

    document.getElementById("exercise").innerText = ex.name;

    if(remaining <= 0){

      phaseStart = Date.now();
      phaseDuration = workout.rest * 1000;

      index = 0;
      round++;

      if(round > workout.rounds){
        playSound("complete");
        stop();
        return;
      }

      startPhase(ex);
    }
  }
}

/* =========================
   STOP
========================= */

function stop(){

  clearInterval(interval);

  running = false;
  paused = false;

  mode = "idle";
  index = 0;
  round = 1;

  document.getElementById("phaseLabel").innerText = "READY";
  document.getElementById("exercise").innerText = "Ready";
  document.getElementById("timer").innerText = "00:00";
}

/* =========================
   SW
========================= */

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
