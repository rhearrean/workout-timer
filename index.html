<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Timer</title>
<link rel="manifest" href="manifest.json">

<style>
:root {
  --bg:#121212;
  --text:#fff;
  --accent:#007aff;
}

body.light {
  --bg:#fff;
  --text:#000;
}

body {
  font-family: Arial;
  text-align:center;
  padding:20px;
  background:var(--bg);
  color:var(--text);
}

.timer { font-size:3em; margin:20px; }
button { padding:10px 20px; margin:5px; }

button:disabled {
  opacity:0.4;
}
</style>
</head>

<body>

<h1>My Workout Routine</h1>

<div id="phaseLabel">READY</div>
<div id="exercise">Ready</div>
<div class="timer" id="timer">00:00</div>

<button id="startBtn" onclick="start()">Start</button>
<button id="pauseBtn" onclick="togglePause()">Pause</button>
<button onclick="toggleTheme()" id="themeBtn">🌙</button>

<script>

/* =========================
   STATE
========================= */

let runId = 0;

let uiLocked = false;

let running = false;
let paused = false;

let mode = "idle";
let index = 0;
let round = 1;

let interval = null;
let phaseTimeout = null;
let phaseLocked = false;

let phaseStart = 0;
let phaseDuration = 0;

let workoutStart = 0;

/* =========================
   DATA
========================= */

const AUDIO_DELAY = 3000;

const warmup = [
  { name:"Jumping Jacks", key:"jj", time:30 },
  { name:"High Knees", key:"knees", time:30 },
  { name:"Twists", key:"twists", time:30 },
  { name:"Squats", key:"squats", time:30 }
];

/* =========================
   AUDIO
========================= */

const audioPool = {};

const sounds = {
  start:"audio/start.wav",
  complete:"audio/complete.wav",
  halfway:"audio/halfway.wav",

  jj_intro:"audio/jj_intro.wav",
  knees_intro:"audio/knees_intro.wav",
  twists_intro:"audio/twists_intro.wav",
  squats_intro:"audio/squats_intro.wav",

  one:"audio/1.wav",
  two:"audio/2.wav",
  three:"audio/3.wav",
  four:"audio/4.wav",
  five:"audio/5.wav"
};

function initAudio(){
  Object.entries(sounds).forEach(([k,s])=>{
    audioPool[k] = new Audio(s);
  });
}

function playSound(k){
  const a = audioPool[k];
  if(!a) return;
  a.pause();
  a.currentTime = 0;
  a.play().catch(()=>{});
}

/* =========================
   UI
========================= */

function updateButtons(){

  const startBtn = document.getElementById("startBtn");
  const pauseBtn = document.getElementById("pauseBtn");

  if(uiLocked){
    startBtn.disabled = true;
    pauseBtn.disabled = true;
    return;
  }

  startBtn.disabled = false;
  pauseBtn.disabled = false;

  startBtn.innerText = running ? "Stop" : "Start";
  pauseBtn.innerText = paused ? "Resume" : "Pause";
}

/* =========================
   START
========================= */

function start(){

  runId++;

  clearInterval(interval);
  clearTimeout(phaseTimeout);

  interval = null;
  phaseTimeout = null;

  running = true;
  paused = false;
  phaseLocked = false;

  index = 0;
  round = 1;
  mode = "warmup";

  workoutStart = Date.now();

  uiLocked = true;
  updateButtons();

  document.getElementById("phaseLabel").innerText = "GET READY";
  document.getElementById("exercise").innerText = "";
  document.getElementById("timer").innerText = "00:00";

  setTimeout(()=>{

    playSound("start");

    setTimeout(()=>{
      run531();
    }, 900);

  }, 700);
}

/* =========================
   5–3–1
========================= */

function run531(){

  const thisRun = runId;
  const steps = [5,4,3,2,1];
  let i = 0;

  const t = setInterval(()=>{

    if(thisRun !== runId){
      clearInterval(t);
      return;
    }

    if(i >= steps.length){

      clearInterval(t);

      uiLocked = false;
      updateButtons();

      startWarmup();
      interval = setInterval(tick, 100);

      return;
    }

    const n = steps[i];

    document.getElementById("timer").innerText =
      `00:0${n}`;

    playSound(
      n===5?"five":
      n===4?"four":
      n===3?"three":
      n===2?"two":"one"
    );

    i++;

  }, 1000);
}

/* =========================
   PHASE ENGINE
========================= */

function startPhase(item){

  if(phaseLocked) return;
  phaseLocked = true;

  const thisRun = runId;

  playSound(item.key + "_intro");

  clearTimeout(phaseTimeout);

  phaseTimeout = setTimeout(()=>{

    if(thisRun !== runId) return;

    phaseStart = Date.now();
    phaseDuration = item.time * 1000;

    phaseLocked = false;

  }, AUDIO_DELAY);
}

/* =========================
   FLOW
========================= */

function startWarmup(){
  mode = "warmup";
  startPhase(warmup[index]);
}

/* =========================
   LOOP
========================= */

function tick(){

  if(!running || paused || phaseLocked) return;

  const now = Date.now();
  const remaining = phaseDuration - (now - phaseStart);

  const t = Math.max(0, Math.ceil(remaining/1000));

  document.getElementById("timer").innerText =
    `00:${String(t).padStart(2,'0')}`;

  document.getElementById("phaseLabel").innerText = "WARMUP";
  document.getElementById("exercise").innerText = warmup[index].name;

  if(remaining <= 0){

    index++;

    if(index >= warmup.length){
      playSound("complete");
      stop();
      return;
    }

    startPhase(warmup[index]);
  }
}

/* =========================
   PAUSE
========================= */

function togglePause(){

  if(!running) return;

  if(!paused){
    paused = true;
    clearInterval(interval);
  } else {
    paused = false;
    interval = setInterval(tick, 100);
  }

  updateButtons();
}

/* =========================
   THEME
========================= */

function toggleTheme(){
  document.body.classList.toggle("light");
}

/* =========================
   STOP (TRUE HARD RESET)
========================= */

function stop(){

  runId++;

  clearInterval(interval);
  clearTimeout(phaseTimeout);

  interval = null;
  phaseTimeout = null;

  running = false;
  paused = false;
  phaseLocked = false;
  uiLocked = false;

  mode = "idle";
  index = 0;
  round = 1;

  document.getElementById("phaseLabel").innerText = "READY";
  document.getElementById("exercise").innerText = "Ready";
  document.getElementById("timer").innerText = "00:00";

  updateButtons();
}

/* =========================
   INIT
========================= */

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
