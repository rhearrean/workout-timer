<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Timer</title>
<link rel="manifest" href="manifest.json">

<style>
:root {
  --bg: #ffffff;
  --text: #000000;
  --accent: #007aff;
}
body.dark {
  --bg: #121212;
  --text: #ffffff;
}
body {
  font-family: Arial;
  text-align: center;
  padding: 20px;
  background: var(--bg);
  color: var(--text);
}
.timer { font-size: 3em; margin: 20px; }
.exercise { font-size: 1.4em; margin: 10px; }
button { padding: 10px 20px; margin: 5px; }
.icon-btn { font-size: 1.5em; }
.progress {
  width: 100%;
  height: 10px;
  background: #333;
  margin-top: 20px;
}
.progress-bar {
  height: 100%;
  width: 0%;
  background: var(--accent);
}
</style>
</head>

<body class="dark">

<h1>Warm-Up Timer</h1>

<div class="exercise" id="exercise">Ready</div>
<div class="timer" id="timer">00:00</div>
<div id="totalTime">Total: 00:00 / 02:00</div>

<div class="progress">
  <div class="progress-bar" id="progressBar"></div>
</div>

<button onclick="start()">Start</button>
<button onclick="pause()">Pause</button>
<button onclick="resume()">Resume</button>
<button class="icon-btn" onclick="toggleDark()" id="themeBtn">☀️</button>

<script>
const workout = [
  { name: "Jumping Jacks", key: "jj", time: 30 },
  { name: "High Knees", key: "knees", time: 30 },
  { name: "Torso Twists + Arm Circles", key: "twists", time: 30 },
  { name: "Bodyweight Squats", key: "squats", time: 30 }
];

let index = 0;
let timeLeft = 0;
let totalElapsed = 0;
let totalDuration = workout.reduce((sum, ex) => sum + ex.time, 0);

let interval = null;
let isTransitioning = false;
let isPaused = false;
let activeTimeouts = [];
let phase = "idle"; // countdown | exercise

// 🎧 Audio files (no reuse bug)
const soundFiles = {
  start: "audio/start.wav",
  complete: "audio/complete.wav",
  jj_intro: "audio/jj_intro.wav",
  knees_intro: "audio/knees_intro.wav",
  twists_intro: "audio/twists_intro.wav",
  squats_intro: "audio/squats_intro.wav",
  halfway: "audio/halfway.wav"
};

let currentSound = null;

function playSound(name) {
  const src = soundFiles[name];
  if (!src) return null;

  const sound = new Audio(src);

  if (currentSound) currentSound.pause();

  currentSound = sound;
  sound.play().catch(() => {});

  return sound;
}

function safeTimeout(fn, delay) {
  const id = setTimeout(fn, delay);
  activeTimeouts.push(id);
  return id;
}

function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function update() {
  document.getElementById("exercise").innerText = workout[index].name;
  document.getElementById("timer").innerText = formatTime(timeLeft);

  document.getElementById("totalTime").innerText =
    `Total: ${formatTime(totalElapsed)} / ${formatTime(totalDuration)}`;

  document.getElementById("progressBar").style.width =
    (totalElapsed / totalDuration) * 100 + "%";
}

// ▶️ Start
function start() {
  clearInterval(interval);
  activeTimeouts.forEach(t => clearTimeout(t));
  activeTimeouts = [];

  isPaused = false;
  index = 0;
  totalElapsed = 0;

  playSound("start");

  startExercise(index);
}

// 🎧 Exercise start
function startExercise(exIndex) {
  isTransitioning = true;
  phase = "countdown";

  let audioDone = false;
  let countdownDone = false;

  document.getElementById("exercise").innerText = workout[exIndex].name;

  function vibrate(p) {
    if (navigator.vibrate) navigator.vibrate(p);
  }

  // play intro
  const intro = playSound(workout[exIndex].key + "_intro");

  // countdown
  document.getElementById("timer").innerText = "00:03";
  vibrate(50);

  safeTimeout(() => {
    document.getElementById("timer").innerText = "00:02";
    vibrate(50);
  }, 1000);

  safeTimeout(() => {
    document.getElementById("timer").innerText = "00:01";
    vibrate(50);
  }, 2000);

  safeTimeout(() => {
    countdownDone = true;
    tryStart();
  }, 3000);

  function tryStart() {
    if (!audioDone || !countdownDone || isPaused) return;

    isTransitioning = false;
    phase = "exercise";

    vibrate([100, 50, 100]);

    timeLeft = workout[exIndex].time;

    update();

    interval = setInterval(tick, 1000);
  }

  if (intro) {
    intro.onended = () => {
      audioDone = true;
      tryStart();
    };

    safeTimeout(() => {
      audioDone = true;
      tryStart();
    }, 4000);
  } else {
    audioDone = true;
  }
}

// 🔁 Tick
function tick() {
  if (isPaused || isTransitioning) return;

  timeLeft--;
  totalElapsed++;

  if (timeLeft === Math.floor(workout[index].time / 2)) {
    playSound("halfway");
  }

  if (timeLeft <= 0) {
    clearInterval(interval);

    index++;

    if (index >= workout.length) {
      playSound("complete");
      document.getElementById("exercise").innerText = "Workout Complete";
      document.getElementById("timer").innerText = "00:00";
      return;
    }

    startExercise(index);
    return;
  }

  update();
}

// ⏸ Pause
function pause() {
  if (isPaused) return;

  isPaused = true;

  clearInterval(interval);

  activeTimeouts.forEach(t => clearTimeout(t));
  activeTimeouts = [];

  if (currentSound) currentSound.pause();
}

// ▶️ Resume
function resume() {
  if (!isPaused) return;

  isPaused = false;

  if (phase === "countdown") {
    startExercise(index); // restart clean
    return;
  }

  if (phase === "exercise") {
    interval = setInterval(tick, 1000);
  }
}

// 🌙 Dark toggle
function toggleDark() {
  document.body.classList.toggle("dark");
  document.getElementById("themeBtn").innerText =
    document.body.classList.contains("dark") ? "☀️" : "🌙";
}
</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
