<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Timer</title>
<link rel="manifest" href="manifest.json">

<style>
:root {
  --bg: #ffffff;
  --text: #000000;
  --accent: #007aff;
}

body.dark {
  --bg: #121212;
  --text: #ffffff;
}

body {
  font-family: Arial;
  text-align: center;
  padding: 20px;
  background: var(--bg);
  color: var(--text);
}

.timer { font-size: 3em; margin: 20px; }
.exercise { font-size: 1.4em; margin: 10px; }

button {
  padding: 10px 20px;
  margin: 5px;
}

.icon-btn {
  font-size: 1.5em;
}

.progress {
  width: 100%;
  height: 10px;
  background: #333;
  margin-top: 20px;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: var(--accent);
}
</style>
</head>

<body class="dark">

<h1>Warm-Up Timer</h1>

<div class="exercise" id="exercise">Ready</div>
<div class="timer" id="timer">00:00</div>
<div id="totalTime">Total: 00:00 / 02:00</div>

<div class="progress">
  <div class="progress-bar" id="progressBar"></div>
</div>

<button onclick="start()">Start</button>
<button onclick="pause()">Pause</button>
<button onclick="resume()">Resume</button>
<button class="icon-btn" onclick="toggleDark()" id="themeBtn">☀️</button>

<script>
const workout = [
  { name: "Jumping Jacks", key: "jj", time: 30 },
  { name: "High Knees", key: "knees", time: 30 },
  { name: "Torso Twists + Arm Circles", key: "twists", time: 30 },
  { name: "Bodyweight Squats", key: "squats", time: 30 }
];

let index = 0;
let timeLeft = 0;
let totalElapsed = 0;
let totalDuration = workout.reduce((sum, ex) => sum + ex.time, 0);

let interval = null;
let isTransitioning = false;
const exerciseDelay = 3;

// 🎧 Audio
const sounds = {
  start: new Audio("audio/start.wav"),
  complete: new Audio("audio/complete.wav"),

  jj: new Audio("audio/jj.wav"),
  knees: new Audio("audio/knees.wav"),
  twists: new Audio("audio/twists.wav"),
  squats: new Audio("audio/squats.wav"),

  halfway: new Audio("audio/halfway.wav"),

  5: new Audio("audio/5.wav"),
  4: new Audio("audio/4.wav"),
  3: new Audio("audio/3.wav"),
  2: new Audio("audio/2.wav"),
  1: new Audio("audio/1.wav")
};

let currentSound = null;

function playSound(name) {
  const sound = sounds[name];
  if (!sound) return;

  if (currentSound) {
    currentSound.pause();
    currentSound.currentTime = 0;
  }

  currentSound = sound;
  sound.currentTime = 0;
  sound.play().catch(() => {});
}

// ⏱ Format
function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

// 🔄 UI update
function update() {
  document.getElementById("exercise").innerText = workout[index].name;
  document.getElementById("timer").innerText = formatTime(timeLeft);

  document.getElementById("totalTime").innerText =
    `Total: ${formatTime(totalElapsed)} / ${formatTime(totalDuration)}`;

  const progress = (totalElapsed / totalDuration) * 100;
  document.getElementById("progressBar").style.width = progress + "%";
}

// ⏱ Delay before each exercise
function startExerciseWithDelay(exIndex) {
  isTransitioning = true;

  let countdown = exerciseDelay;

  document.getElementById("exercise").innerText =
    `Get Ready: ${workout[exIndex].name}`;
  document.getElementById("timer").innerText = `00:0${countdown}`;

  playSound(workout[exIndex].key);

  const delayInterval = setInterval(() => {
    countdown--;

    document.getElementById("timer").innerText = `00:0${countdown}`;

    if (countdown <= 3 && countdown > 0) {
      playSound(countdown.toString());
    }

    if (countdown <= 0) {
      clearInterval(delayInterval);

      isTransitioning = false;

      timeLeft = workout[exIndex].time;

      update();

      interval = setInterval(tick, 1000);
    }
  }, 1000);
}

// ▶️ Start
function start() {
  clearInterval(interval);
  interval = null;

  index = 0;
  totalElapsed = 0;

  playSound("start");

  startExerciseWithDelay(index);
}

// 🔁 Tick
function tick() {
  if (isTransitioning) return;

  timeLeft--;
  totalElapsed++;

  if (timeLeft <= 5 && timeLeft > 0) {
    playSound(timeLeft.toString());
  }

  if (timeLeft === Math.floor(workout[index].time / 2)) {
    playSound("halfway");
  }

  if (timeLeft <= 0) {
    clearInterval(interval);
    interval = null;

    index++;

    if (index >= workout.length) {
      playSound("complete");
      document.getElementById("exercise").innerText = "Workout Complete";
      document.getElementById("timer").innerText = "00:00";
      return;
    }

    startExerciseWithDelay(index);
    return;
  }

  update();
}

// ⏸ Pause
function pause() {
  clearInterval(interval);
  interval = null;
}

// ▶️ Resume
function resume() {
  if (!interval && !isTransitioning) {
    interval = setInterval(tick, 1000);
  }
}

// 🌙 Toggle Dark
function toggleDark() {
  document.body.classList.toggle("dark");
  const btn = document.getElementById("themeBtn");
  btn.innerText = document.body.classList.contains("dark") ? "☀️" : "🌙";
}
</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
