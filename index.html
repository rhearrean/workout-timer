<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Timer</title>
<link rel="manifest" href="manifest.json">

<style>
:root {
  --bg:#121212;
  --text:#ffffff;
}

body.light {
  --bg:#ffffff;
  --text:#000000;
}

body {
  font-family: Arial;
  text-align:center;
  padding:20px;
  background:var(--bg);
  color:var(--text);
}
.timer { font-size:3em; margin:20px; }
button { padding:10px 20px; margin:5px; }
button:disabled { opacity:0.4; }
</style>
</head>

<body>

<h1>My Workout Routine</h1>

<div id="phase">READY</div>
<div id="exercise">Ready</div>
<div class="timer" id="timer">00:00</div>

<div id="total">Total: 00:00</div>

<button onclick="start()" id="startBtn">Start</button>
<button onclick="pause()" id="pauseBtn">Pause</button>
<button onclick="toggleTheme()" id="themeBtn">🌙</button>

<script>

// =========================
// SESSION GUARD
// =========================

function isDeadSession(id){
  return id !== state.sessionId || state.status === "idle";
}

// =========================
// 1. SINGLE STATE OBJECT
// =========================

const state = {
  sessionId: 0,

  status: "idle",   // idle | running | paused
  mode: "warmup",   // warmup | workout

  index: 0,

  phaseStart: 0,
  phaseDuration: 0,

  workoutStart: 0,

  uiLocked: false
};

let loop = null;

// =========================
// 2. DATA
// =========================

const warmup = [
  { name:"Jumping Jacks", key:"jj", time:30 },
  { name:"High Knees", key:"knees", time:30 },
  { name:"Twists", key:"twists", time:30 },
  { name:"Squats", key:"squats", time:30 }
];

// =========================
// 3. AUDIO
// =========================

const audio = {};

const sounds = {
  start:"audio/start.wav",
  complete:"audio/complete.wav",

  jj_intro:"audio/jj_intro.wav",
  knees_intro:"audio/knees_intro.wav",
  twists_intro:"audio/twists_intro.wav",
  squats_intro:"audio/squats_intro.wav"
};

function initAudio(){
  if(Object.keys(audio).length) return;

  for(const k in sounds){
    audio[k] = new Audio(sounds[k]);
    audio[k].preload = "auto";
  }
}

function play(k){
  const a = audio[k];
  if(!a) return;
  a.pause();
  a.currentTime = 0;
  a.play().catch(()=>{});
}

// =========================
// 4. ENGINE CONTROL
// =========================

function start(){

  state.sessionId++;
  const id = state.sessionId;

  initAudio();

  state.status = "running";
  state.mode = "warmup";
  state.index = 0;
  state.workoutStart = Date.now();

  state.uiLocked = true;

  document.getElementById("phase").innerText = "GET READY";

  play("start");

  setTimeout(()=>{
    if(isDeadSession(state.sessionId)) return;

    state.phaseStart = Date.now();
    state.phaseDuration = warmup[0].time * 1000;

    state.uiLocked = false;
    updateButtons();

  }, 1500);

  if(loop) clearInterval(loop);

  loop = setInterval(()=>tick(id), 100);
}

// =========================
// 5. MAIN LOOP (ONLY LOGIC ENGINE)
// =========================

function tick(id){
  
  if(isDeadSession(id)) return;

  if(state.sessionId !== id) return;
  if(state.status !== "running") return;

  const now = Date.now();
  const remaining = state.phaseDuration - (now - state.phaseStart);

  const sec = Math.max(0, Math.ceil(remaining/1000));

  document.getElementById("timer").innerText =
    `00:${String(sec).padStart(2,'0')}`;

  document.getElementById("exercise").innerText =
    warmup[state.index].name;

  document.getElementById("phase").innerText = "WARMUP";

  updateTotal();

  if(remaining <= 0){

    state.index++;

    if(state.index >= warmup.length){
      play("complete");
      stop();
      return;
    }

    state.phaseStart = Date.now();
    state.phaseDuration = warmup[state.index].time * 1000;
  }
}

// =========================
// 6. STOP (TRUE HARD RESET)
// =========================

function stop(){

  // invalidate EVERYTHING immediately
  state.sessionId++;
  state.status = "idle";

  clearInterval(loop);
  loop = null;

  clearTimeout(phaseTimeout);
  phaseTimeout = null;

  state.index = 0;
  state.phaseStart = 0;
  state.phaseDuration = 0;

  document.getElementById("phase").innerText = "READY";
  document.getElementById("exercise").innerText = "Ready";
  document.getElementById("timer").innerText = "00:00";
  document.getElementById("total").innerText = "Total: 00:00";

  updateButtons();
}

// =========================
// PAUSE / RESUME
// =========================

let pausedAt = 0;

function pause(){

  if(state.status === "running"){

    // PAUSE
    state.status = "paused";

    pausedAt = Date.now();

    clearInterval(loop);
    loop = null;
  }

  else if(state.status === "paused"){

    // RESUME
    state.status = "running";

    // shift timer forward by pause duration
    const pauseDuration = Date.now() - pausedAt;

    state.phaseStart += pauseDuration;
    state.workoutStart += pauseDuration;

    const id = state.sessionId;

    loop = setInterval(()=>tick(id), 100);
  }

  updateButtons();
}

// =========================
// 8. UI HELPERS
// =========================

function updateButtons(){

  const startBtn = document.getElementById("startBtn");
  const pauseBtn = document.getElementById("pauseBtn");

  if(state.uiLocked){
    startBtn.disabled = true;
    pauseBtn.disabled = true;
    return;
  }

  startBtn.disabled = false;
  pauseBtn.disabled = false;

  startBtn.innerText =
    state.status === "running" ? "Stop" : "Start";

  pauseBtn.innerText =
    state.status === "paused" ? "Resume" : "Pause";
}

function updateTotal(){

  const t = Math.floor((Date.now() - state.workoutStart)/1000);
  const m = Math.floor(t/60);
  const s = t % 60;

  document.getElementById("total").innerText =
    `Total: ${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

// =========================
// THEME
// =========================

function toggleTheme(){

  document.body.classList.toggle("light");

  document.getElementById("themeBtn").innerText =
    document.body.classList.contains("light")
      ? "☀️"
      : "🌙";
}

// =========================
// 9. SW
// =========================

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
