<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Timer</title>
<link rel="manifest" href="manifest.json">

<style>
:root {
  --bg: #ffffff;
  --text: #000000;
  --accent: #007aff;
}

body.dark {
  --bg: #121212;
  --text: #ffffff;
}

body {
  font-family: Arial;
  text-align: center;
  padding: 20px;
  background: var(--bg);
  color: var(--text);
}

.timer { font-size: 3em; margin: 20px; }
.exercise { font-size: 1.4em; margin: 10px; }

button {
  padding: 10px 20px;
  margin: 5px;
}

.icon-btn {
  font-size: 1.5em;
}

.progress {
  width: 100%;
  height: 10px;
  background: #ccc;
  margin-top: 20px;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: var(--accent);
}
</style>
</head>

<body>

<h1>Warm-Up Timer</h1>

<div class="exercise" id="exercise">Ready</div>
<div class="timer" id="timer">00:30</div>
<div id="totalTime">Total: 00:00 / 02:00</div>

<div class="progress">
  <div class="progress-bar" id="progressBar"></div>
</div>

<button onclick="start()">Start</button>
<button onclick="pause()">Pause</button>
<button onclick="resume()">Resume</button>
<button class="icon-btn" onclick="toggleDark()" id="themeBtn">🌙</button>

<script>
const workout = [
  { name: "Jumping Jacks", key: "jj", time: 30 },
  { name: "High Knees", key: "knees", time: 30 },
  { name: "Torso Twists + Arm Circles", key: "twists", time: 30 },
  { name: "Bodyweight Squats", key: "squats", time: 30 }
];

let index = 0;
let timeLeft = workout[0].time;
let totalElapsed = 0;
let totalDuration = workout.reduce((sum, ex) => sum + ex.time, 0);
let interval;

// 🎧 Audio system (REAL voice files)
const sounds = {
  start: new Audio("audio/start.wav"),
  complete: new Audio("audio/complete.wav"),

  jj: new Audio("audio/jj.wav"),
  knees: new Audio("audio/knees.wav"),
  twists: new Audio("audio/twists.wav"),
  squats: new Audio("audio/squats.wav"),

  halfway: new Audio("audio/halfway.wav"),

  5: new Audio("audio/5.wav"),
  4: new Audio("audio/4.wav"),
  3: new Audio("audio/3.wav"),
  2: new Audio("audio/2.wav"),
  1: new Audio("audio/1.wav")
};

// 🔊 Play sound safely
function playSound(name) {
  const sound = sounds[name];
  if (!sound) return;

  sound.currentTime = 0;
  sound.play().catch(() => {});
}

// ⏱ Format time
function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

// 🔄 Update UI
function update() {
  document.getElementById("exercise").innerText = workout[index].name;
  document.getElementById("timer").innerText = formatTime(timeLeft);

  document.getElementById("totalTime").innerText =
    `Total: ${formatTime(totalElapsed)} / ${formatTime(totalDuration)}`;

  let progress = (totalElapsed / totalDuration) * 100;
  document.getElementById("progressBar").style.width = progress + "%";
}

// ▶️ Start
function start() {
  if (interval) return;

  playSound("start");

  update();
  interval = setInterval(tick, 1000);
}

// 🔁 Tick
function tick() {
  timeLeft--;
  totalElapsed++;

  // ⏳ Countdown
  if (timeLeft <= 5 && timeLeft > 0) {
    playSound(timeLeft.toString());
  }

  // ⏱ Halfway cue
  if (timeLeft === Math.floor(workout[index].time / 2)) {
    playSound("halfway");
  }

  if (timeLeft <= 0) {
    index++;

    if (index >= workout.length) {
      clearInterval(interval);
      playSound("complete");
      document.getElementById("exercise").innerText = "Done!";
      return;
    }

    // 🎧 Next exercise voice
    playSound(workout[index].key);

    timeLeft = workout[index].time;
  }

  update();
}

// ⏸ Pause
function pause() {
  clearInterval(interval);
  interval = null;
}

// ▶️ Resume
function resume() {
  if (!interval) interval = setInterval(tick, 1000);
}

// 🌙 Toggle Dark Mode
function toggleDark() {
  document.body.classList.toggle("dark");
  const btn = document.getElementById("themeBtn");

  btn.innerText = document.body.classList.contains("dark") ? "☀️" : "🌙";
}
</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
