<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Workout Timer</title>
<link rel="manifest" href="manifest.json">

<style>
:root {
  --bg:#121212;
  --text:#fff;
  --accent:#007aff;
}
body.light {
  --bg:#fff;
  --text:#000;
}

body {
  font-family: Arial;
  text-align: center;
  padding: 20px;
  background: var(--bg);
  color: var(--text);
}

.timer { font-size:3em; margin:20px; }
button { padding:10px 20px; margin:5px; }

.progress {
  width:100%;
  height:10px;
  background:#333;
}
.progress-bar {
  height:100%;
  width:0%;
  background:var(--accent);
}
</style>
</head>

<body>

<!-- FIXED TITLE -->
<h1>My Workout Routine</h1>

<div id="phaseLabel">Ready</div>

<div id="exercise">Ready</div>

<div class="timer" id="timer">00:00</div>

<div id="totalTime">Total: 00:00</div>

<div class="progress">
  <div class="progress-bar" id="progressBar"></div>
</div>

<button id="startBtn" onclick="handleStartStop()">Start</button>
<button id="pauseBtn" onclick="togglePause()">Pause</button>

<script>

/* =========================
   WARMUP (UNCHANGED)
========================= */
const warmup = [
  { name:"Jumping Jacks", key:"jj", time:30 },
  { name:"High Knees", key:"knees", time:30 },
  { name:"Torso Twists + Arm Circles", key:"twists", time:30 },
  { name:"Bodyweight Squats", key:"squats", time:30 }
];

/* =========================
   WORKOUT CIRCUIT
========================= */
const workout = {
  rounds: 3,
  exercises: [
    { name:"Plank Taps", key:"plank_taps", time:40 }
  ],
  rest: 20
};

/* =========================
   STATE
========================= */
let mode = "warmup"; // warmup | workout

let index = 0;
let round = 1;

let isRunning = false;
let isPaused = false;

let phase = "idle";

let phaseStart = 0;
let phaseDuration = 0;

let workoutStart = 0;
let pausedAt = 0;

let interval = null;

let timeLeft = 0;

/* =========================
   AUDIO
========================= */
const audioPool = {};
let unlocked = false;

const sounds = {
  start:"audio/start.wav",
  complete:"audio/complete.wav",
  halfway:"audio/halfway.wav",
  jj_intro:"audio/jj_intro.wav",
  knees_intro:"audio/knees_intro.wav",
  twists_intro:"audio/twists_intro.wav",
  squats_intro:"audio/squats_intro.wav",
  plank_taps_intro:"audio/plank_taps_intro.wav"
};

function initAudio(){
  Object.entries(sounds).forEach(([k,s])=>{
    audioPool[k] = new Audio(s);
  });
}

function unlockAudio(){
  if(unlocked) return;
  Object.values(audioPool).forEach(a=>{
    a.volume = 0;
    a.play().then(()=>{
      a.pause();
      a.currentTime = 0;
      a.volume = 1;
    }).catch(()=>{});
  });
  unlocked = true;
}

function playSound(k){
  const a = audioPool[k];
  if(!a) return;
  a.pause();
  a.currentTime = 0;
  a.play().catch(()=>{});
}

/* =========================
   START / STOP
========================= */
function handleStartStop(){
  if(!isRunning) start();
  else stop();
}

function start(){

  if(Object.keys(audioPool).length === 0)
    initAudio();

  unlockAudio();

  isRunning = true;
  isPaused = false;

  index = 0;
  round = 1;
  mode = "warmup";

  workoutStart = Date.now();

  document.getElementById("startBtn").innerText = "Stop";

  playSound("start");

  startWarmup();

  interval = setInterval(tick, 100);
}

function stop(){

  clearInterval(interval);

  isRunning = false;
  isPaused = false;

  phase = "idle";
  mode = "warmup";

  index = 0;
  round = 1;

  document.getElementById("startBtn").innerText = "Start";
  document.getElementById("exercise").innerText = "Ready";
  document.getElementById("timer").innerText = "00:00";
  document.getElementById("phaseLabel").innerText = "Ready";
  document.getElementById("totalTime").innerText = "Total: 00:00";
}

/* =========================
   PHASE STARTS
========================= */
function startWarmup(){
  mode = "warmup";
  startPhase(warmup[index]);
}

function startWorkout(){
  mode = "workout";
  startPhase(workout.exercises[0]);
}

/* =========================
   CORE TIMER
========================= */
function startPhase(item){

  phase = "running";

  phaseStart = Date.now();

  phaseDuration = item.time * 1000;

  playSound(item.key + "_intro");
}

/* =========================
   LOOP
========================= */
function tick(){

  if(!isRunning || isPaused) return;

  const now = Date.now();

  const remaining = phaseDuration - (now - phaseStart);

  timeLeft = Math.max(0, Math.ceil(remaining/1000));

  document.getElementById("timer").innerText =
    `00:${String(timeLeft).padStart(2,'0')}`;

  /* ================= WARMUP ================= */
  if(mode === "warmup"){

    document.getElementById("phaseLabel").innerText = "Warm Up";

    document.getElementById("exercise").innerText =
      warmup[index].name;

    if(remaining <= 0){

      index++;

      if(index >= warmup.length){
        startWorkout();
        return;
      }

      startPhase(warmup[index]);
    }
  }

  /* ================= WORKOUT ================= */
  else if(mode === "workout"){

    document.getElementById("phaseLabel").innerText =
      `Workout - Round ${round}`;

    const ex = workout.exercises[0];

    document.getElementById("exercise").innerText = ex.name;

    if(remaining <= 0){

      // rest
      phaseStart = Date.now();
      phaseDuration = workout.rest * 1000;

      index++;

      if(index > 0){

        index = 0;
        round++;

        if(round > workout.rounds){
          playSound("complete");
          stop();
          return;
        }
      }

      startPhase(ex);
    }
  }

  updateUI();
}

/* =========================
   UI
========================= */
function updateUI(){

  const total = Math.floor((Date.now()-workoutStart)/1000);

  const m = Math.floor(total/60);
  const s = total % 60;

  document.getElementById("totalTime").innerText =
    `Total: ${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

/* =========================
   PAUSE
========================= */
function togglePause(){

  if(!isRunning) return;

  if(!isPaused){

    isPaused = true;
    pausedAt = Date.now();
    document.getElementById("pauseBtn").innerText = "Resume";

  } else {

    isPaused = false;

    const diff = Date.now() - pausedAt;

    phaseStart += diff;
    workoutStart += diff;

    document.getElementById("pauseBtn").innerText = "Pause";
  }
}

/* =========================
   THEME
========================= */
function toggleTheme(){
  document.body.classList.toggle("light");
}

/* =========================
   SW
========================= */
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
