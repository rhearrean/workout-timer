<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Timer</title>

<style>
:root {
  --bg:#121212;
  --text:#fff;
}

body.light {
  --bg:#fff;
  --text:#000;
}

body {
  font-family: Arial;
  text-align:center;
  padding:20px;
  background:var(--bg);
  color:var(--text);
}

.timer { font-size:3em; margin:20px; }
button { padding:10px 20px; margin:5px; }

button:disabled { opacity:0.4; }

#panel {
  margin-top:15px;
  padding:10px;
  border:1px solid #333;
  border-radius:8px;
}
</style>
</head>

<body>

<h1>Workout</h1>

<div id="phase">READY</div>
<div id="exercise">Ready</div>

<div class="timer" id="timer">00:00</div>
<div id="totalTime">Total: 00:00</div>

<button onclick="start()" id="startBtn">Start</button>
<button onclick="pause()" id="pauseBtn">Pause</button>
<button onclick="toggleTheme()">🌙</button>

<!-- SETTINGS -->
<div id="panel">

  <h3>Settings</h3>

  <div>
    <label>Warmup Time (sec):</label>
    <input id="timeInput" type="number" value="30" min="5" max="300">
  </div>

  <div style="margin-top:10px;">
    <label>
      <input type="checkbox" id="countdownToggle" checked>
      Enable 5–4–3–2–1 Countdown
    </label>
  </div>

  <button id="resetBtn" onclick="resetDefaults()">Reset</button>

</div>

<script>

/* =========================
   DATA
========================= */

const workout = [
  { name:"Jumping Jacks" },
  { name:"High Knees" },
  { name:"Twists" },
  { name:"Squats" }
];

/* =========================
   STATE MACHINE
========================= */

const state = {
  mode: "idle", // idle | countdown | exercise | paused | finished

  index: 0,

  phaseStart: 0,
  phaseDuration: 0,

  totalStart: 0,
  totalPaused: 0,

  pausedAt: 0,

  countdownSteps: ["5","4","3","2","1"]
};

/* =========================
   GLOBAL
========================= */

let loop = null;

/* =========================
   SETTINGS LOCK
========================= */

function setSettingsLocked(lock){
  document.getElementById("timeInput").disabled = lock;
  document.getElementById("countdownToggle").disabled = lock;
  document.getElementById("resetBtn").disabled = lock;
}

/* =========================
   FORMAT
========================= */

function format(sec){
  const m = Math.floor(sec/60);
  const s = sec%60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

/* =========================
   RENDER
========================= */

function render(){
  document.getElementById("exercise").innerText =
    workout[state.index]?.name || "Done";

  document.getElementById("startBtn").innerText =
    state.mode === "exercise" ? "Stop" : "Start";

  document.getElementById("pauseBtn").innerText =
    state.mode === "paused" ? "Resume" : "Pause";
}

/* =========================
   START
========================= */

function start(){

  if(loop) clearInterval(loop);

  setSettingsLocked(true);

  state.mode = "countdown";
  state.index = 0;
  state.totalStart = 0;
  state.totalPaused = 0;

  loop = setInterval(tick, 100);

  runCountdown(() => startExercise());

  render();
}

/* =========================
   STOP
========================= */

function stop(){

  setSettingsLocked(false);

  state.mode = "idle";
  clearInterval(loop);
  loop = null;

  state.index = 0;
  state.totalStart = 0;
  state.totalPaused = 0;

  document.getElementById("timer").innerText = "00:00";
  document.getElementById("totalTime").innerText = "Total: 00:00";

  render();
}

/* =========================
   PAUSE
========================= */

function pause(){

  if(state.mode === "paused"){
    state.totalPaused += Date.now() - state.pausedAt;
    state.phaseStart = Date.now() - state.remaining;
    state.mode = "exercise";
  } else {
    state.pausedAt = Date.now();
    state.remaining = state.phaseDuration - (Date.now() - state.phaseStart);
    state.mode = "paused";
  }

  render();
}

/* =========================
   COUNTDOWN (FIXED - NO DRIFT)
========================= */

function runCountdown(done){

  state.mode = "countdown";

  const start = Date.now();

  const c = setInterval(() => {

    const elapsed = Date.now() - start;
    const step = Math.floor(elapsed / 1000);

    if(step >= state.countdownSteps.length){
      clearInterval(c);
      done(); // EXACTLY 5 seconds later (no drift)
      return;
    }

    document.getElementById("timer").innerText =
      state.countdownSteps[step];

  }, 50);
}

/* =========================
   EXERCISE START
========================= */

function startExercise(){

  const time =
    parseInt(document.getElementById("timeInput").value) || 30;

  state.mode = "exercise";

  state.phaseStart = Date.now();
  state.phaseDuration = time * 1000;

  // ✅ FIXED: total timer starts EXACTLY here
  if(state.totalStart === 0){
    state.totalStart = Date.now();
  }

  document.getElementById("phase").innerText = "WARMUP";

  render();
}

/* =========================
   LOOP ENGINE
========================= */

function tick(){

  if(state.mode === "paused" || state.mode === "countdown") return;
  if(state.mode !== "exercise") return;

  const now = Date.now();

  const remaining =
    state.phaseDuration - (now - state.phaseStart);

  const sec = Math.max(0, Math.ceil(remaining/1000));

  document.getElementById("timer").innerText =
    `00:${String(sec).padStart(2,'0')}`;

  /* TOTAL TIME */
  const total =
    Math.floor((now - state.totalStart - state.totalPaused) / 1000);

  document.getElementById("totalTime").innerText =
    `Total: ${format(total)}`;

  /* NEXT */
  if(remaining <= 0){

    state.index++;

    if(state.index >= workout.length){
      stop();
      return;
    }

    runCountdown(() => startExercise());
  }
}

/* =========================
   SETTINGS
========================= */

function resetDefaults(){
  document.getElementById("timeInput").value = 30;
  document.getElementById("countdownToggle").checked = true;
}

function toggleTheme(){
  document.body.classList.toggle("light");
}

render();

</script>

</body>
</html>
