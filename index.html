<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Timer</title>
<link rel="manifest" href="manifest.json">

<style>
body {
  font-family: Arial;
  text-align: center;
  padding: 20px;
  background: #121212;
  color: white;
}
.timer { font-size: 3em; margin: 20px; }
button { padding: 10px 20px; margin: 5px; }
</style>
</head>

<body>

<h1>My Workout Routine</h1>

<div id="phaseLabel">READY</div>
<div id="exercise">Ready</div>
<div class="timer" id="timer">00:00</div>

<button onclick="start()">Start</button>
<button onclick="togglePause()">Pause</button>

<script>

/* =========================
   DATA
========================= */

const AUDIO_DELAY = 3000;

const warmup = [
  { name:"Jumping Jacks", key:"jj", time:30 },
  { name:"High Knees", key:"knees", time:30 },
  { name:"Twists", key:"twists", time:30 },
  { name:"Squats", key:"squats", time:30 }
];

const workout = {
  rounds: 3,
  exercises: [
    { name:"Plank Taps", key:"plank_taps", time:40 }
  ],
  rest: 20
};

/* =========================
   STATE
========================= */

let mode = "idle";
let index = 0;
let round = 1;

let running = false;
let paused = false;

let interval = null;
let phaseTimeout = null;
let phaseLocked = false;

let phaseStart = 0;
let phaseDuration = 0;

/* =========================
   AUDIO
========================= */

const audioPool = {};

const sounds = {
  start:"audio/start.wav",
  complete:"audio/complete.wav",
  halfway:"audio/halfway.wav",
  tick:"audio/tick.wav",

  jj_intro:"audio/jj_intro.wav",
  knees_intro:"audio/knees_intro.wav",
  twists_intro:"audio/twists_intro.wav",
  squats_intro:"audio/squats_intro.wav",
  plank_taps_intro:"audio/plank_taps_intro.wav",

  one:"audio/1.wav",
  two:"audio/2.wav",
  three:"audio/3.wav",
  four:"audio/4.wav",
  five:"audio/5.wav"
};

function initAudio(){
  Object.entries(sounds).forEach(([k,s])=>{
    audioPool[k] = new Audio(s);
  });
}

function playSound(k){
  const a = audioPool[k];
  if(!a) return;
  a.pause();
  a.currentTime = 0;
  a.play().catch(()=>{});
}

/* =========================
   CLEAN START
========================= */

function start(){

  // HARD RESET (fix runaway bug)
  clearInterval(interval);
  clearTimeout(phaseTimeout);

  running = true;
  paused = false;
  phaseLocked = false;

  index = 0;
  round = 1;
  mode = "warmup";

  if(Object.keys(audioPool).length === 0)
    initAudio();

  document.getElementById("phaseLabel").innerText = "GET READY";
  document.getElementById("exercise").innerText = "";

  setTimeout(()=>{
    playSound("start");

    setTimeout(()=>{
      run531();
    }, 900);

  }, 700);
}

/* =========================
   5–3–1
========================= */

function run531(){

  const steps = [5,4,3,2,1];
  let i = 0;

  const t = setInterval(()=>{

    if(i >= steps.length){
      clearInterval(t);

      playSound("start");
      startWarmup();

      interval = setInterval(tick, 100);
      return;
    }

    const num = steps[i];

    document.getElementById("timer").innerText =
      `00:0${num}`;

    playSound(
      num === 5 ? "five" :
      num === 4 ? "four" :
      num === 3 ? "three" :
      num === 2 ? "two" : "one"
    );

    i++;

  }, 1000);
}

/* =========================
   PHASE ENGINE (LOCKED)
========================= */

function startPhase(item){

  if(phaseLocked) return;
  phaseLocked = true;

  playSound(item.key + "_intro");

  clearTimeout(phaseTimeout);

  phaseTimeout = setTimeout(()=>{

    phaseStart = Date.now();
    phaseDuration = item.time * 1000;

    phaseLocked = false;

  }, AUDIO_DELAY);
}

/* =========================
   FLOW
========================= */

function startWarmup(){
  mode = "warmup";
  startPhase(warmup[index]);
}

/* =========================
   LOOP
========================= */

function tick(){

  if(!running || paused || phaseLocked) return;

  const now = Date.now();
  const remaining = phaseDuration - (now - phaseStart);

  const t = Math.max(0, Math.ceil(remaining/1000));

  document.getElementById("timer").innerText =
    `00:${String(t).padStart(2,'0')}`;

  if(mode === "warmup"){

    document.getElementById("phaseLabel").innerText = "WARMUP";
    document.getElementById("exercise").innerText = warmup[index].name;

    if(remaining <= 0){

      index++;

      if(index >= warmup.length){
        mode = "workout";
        startWorkout();
        return;
      }

      startPhase(warmup[index]);
    }
  }

  else if(mode === "workout"){

    const ex = workout.exercises[0];

    document.getElementById("phaseLabel").innerText =
      `WORKOUT - ROUND ${round}`;

    document.getElementById("exercise").innerText = ex.name;

    if(remaining <= 0){

      phaseStart = Date.now();
      phaseDuration = workout.rest * 1000;

      round++;

      if(round > workout.rounds){
        playSound("complete");
        stop();
        return;
      }

      startPhase(ex);
    }
  }
}

/* =========================
   WORKOUT START
========================= */

function startWorkout(){
  startPhase(workout.exercises[0]);
}

/* =========================
   STOP
========================= */

function stop(){

  clearInterval(interval);
  clearTimeout(phaseTimeout);

  running = false;
  paused = false;
  phaseLocked = false;

  mode = "idle";
  index = 0;
  round = 1;

  document.getElementById("phaseLabel").innerText = "READY";
  document.getElementById("exercise").innerText = "Ready";
  document.getElementById("timer").innerText = "00:00";
}

/* =========================
   SW
========================= */

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
