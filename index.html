<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Timer</title>
<link rel="manifest" href="manifest.json">

<style>
:root {
  --bg:#121212;
  --text:#fff;
  --accent:#007aff;
}

body.light {
  --bg:#fff;
  --text:#000;
}

body {
  font-family: Arial;
  text-align:center;
  padding:20px;
  background:var(--bg);
  color:var(--text);
}

.timer { font-size:3em; margin:20px; }
button { padding:10px 20px; margin:5px; }

button:disabled { opacity:0.4; }

.progress {
  width:100%;
  height:8px;
  background:#333;
}
.progress-bar {
  height:100%;
  width:0%;
  background:var(--accent);
}
</style>
</head>

<body>

<h1>My Workout Routine</h1>

<div id="phaseLabel">READY</div>
<div id="exercise">Ready</div>
<div class="timer" id="timer">00:00</div>

<div id="totalTime">Total: 00:00</div>

<button id="startBtn" onclick="start()">Start</button>
<button id="pauseBtn" onclick="togglePause()">Pause</button>
<button onclick="toggleTheme()">🌙</button>

<script>

/* =========================
   HARD STATE CONTROL
========================= */

let sessionId = 0;
let sessionActive = false;

let running = false;
let paused = false;

let uiLocked = false;

let interval = null;
let phaseTimeout = null;

let mode = "idle";
let index = 0;

let phaseStart = 0;
let phaseDuration = 0;

let workoutStart = 0;

/* =========================
   DATA
========================= */

const AUDIO_DELAY = 2500;

const warmup = [
  { name:"Jumping Jacks", key:"jj", time:30 },
  { name:"High Knees", key:"knees", time:30 },
  { name:"Twists", key:"twists", time:30 },
  { name:"Squats", key:"squats", time:30 }
];

/* =========================
   AUDIO
========================= */

const audio = {};

const sounds = {
  start:"audio/start.wav",
  complete:"audio/complete.wav",
  halfway:"audio/halfway.wav",

  jj_intro:"audio/jj_intro.wav",
  knees_intro:"audio/knees_intro.wav",
  twists_intro:"audio/twists_intro.wav",
  squats_intro:"audio/squats_intro.wav",

  one:"audio/1.wav",
  two:"audio/2.wav",
  three:"audio/3.wav",
  four:"audio/4.wav",
  five:"audio/5.wav"
};

function initAudio(){
  if(Object.keys(audio).length) return;

  for(const k in sounds){
    const a = new Audio(sounds[k]);
    a.preload = "auto";
    audio[k] = a;
  }
}

function playSound(k){
  const a = audio[k];
  if(!a) return;
  a.pause();
  a.currentTime = 0;
  a.play().catch(()=>{});
}

/* =========================
   UI
========================= */

function updateButtons(){

  const startBtn = document.getElementById("startBtn");
  const pauseBtn = document.getElementById("pauseBtn");

  if(uiLocked){
    startBtn.disabled = true;
    pauseBtn.disabled = true;
    return;
  }

  startBtn.disabled = false;
  pauseBtn.disabled = false;

  startBtn.innerText = running ? "Stop" : "Start";
  pauseBtn.innerText = paused ? "Resume" : "Pause";
}

/* =========================
   TOTAL TIME
========================= */

function updateTotalTime(){
  if(!sessionActive) return;

  const t = Math.floor((Date.now() - workoutStart) / 1000);
  const m = Math.floor(t / 60);
  const s = t % 60;

  document.getElementById("totalTime").innerText =
    `Total: ${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

/* =========================
   START
========================= */

function start(){

  sessionId++;
  const mySession = sessionId;

  sessionActive = true;

  clearInterval(interval);
  clearTimeout(phaseTimeout);

  interval = null;
  phaseTimeout = null;

  running = true;
  paused = false;

  uiLocked = true;

  mode = "warmup";
  index = 0;

  workoutStart = Date.now();

  initAudio();

  document.getElementById("phaseLabel").innerText = "GET READY";
  document.getElementById("exercise").innerText = "";
  document.getElementById("timer").innerText = "00:00";

  updateButtons();

  setTimeout(()=>{

    if(mySession !== sessionId) return;

    playSound("start");

    setTimeout(()=>{
      run531(mySession);
    }, 800);

  }, 600);
}

/* =========================
   5–3–1
========================= */

function run531(mySession){

  const steps = [5,4,3,2,1];
  let i = 0;

  const t = setInterval(()=>{

    if(mySession !== sessionId || !sessionActive){
      clearInterval(t);
      return;
    }

    const n = steps[i];

    document.getElementById("timer").innerText =
      `00:0${n}`;

    playSound(
      n===5?"five":
      n===4?"four":
      n===3?"three":
      n===2?"two":"one"
    );

    i++;

    if(i >= steps.length){

      clearInterval(t);

      uiLocked = false;
      updateButtons();

      startWarmup(mySession);

      interval = setInterval(()=>tick(mySession), 100);
    }

  }, 1000);
}

/* =========================
   PHASES
========================= */

function startWarmup(mySession){

  if(mySession !== sessionId || !sessionActive) return;

  startPhase(warmup[index], mySession);
}

function startPhase(item, mySession){

  if(!sessionActive || mySession !== sessionId) return;

  clearTimeout(phaseTimeout);

  playSound(item.key + "_intro");

  phaseTimeout = setTimeout(()=>{

    if(!sessionActive || mySession !== sessionId) return;

    phaseStart = Date.now();
    phaseDuration = item.time * 1000;

  }, AUDIO_DELAY);
}

/* =========================
   LOOP
========================= */

function tick(mySession){

  if(!sessionActive || paused) return;

  if(mySession !== sessionId) return;

  const now = Date.now();
  const remaining = phaseDuration - (now - phaseStart);

  const t = Math.max(0, Math.ceil(remaining/1000));

  document.getElementById("timer").innerText =
    `00:${String(t).padStart(2,'0')}`;

  document.getElementById("phaseLabel").innerText = "WARMUP";
  document.getElementById("exercise").innerText = warmup[index].name;

  updateTotalTime();

  if(remaining <= 0){

    index++;

    if(index >= warmup.length){
      playSound("complete");
      stop();
      return;
    }

    startPhase(warmup[index], mySession);
  }
}

/* =========================
   PAUSE
========================= */

function togglePause(){

  if(!sessionActive) return;

  if(!paused){
    paused = true;
    clearInterval(interval);
  } else {
    paused = false;
    interval = setInterval(()=>tick(sessionId), 100);
  }

  updateButtons();
}

/* =========================
   STOP (FINAL FIX)
========================= */

function stop(){

  sessionActive = false;
  sessionId++;

  clearInterval(interval);
  clearTimeout(phaseTimeout);

  interval = null;
  phaseTimeout = null;

  running = false;
  paused = false;

  uiLocked = false;

  mode = "idle";
  index = 0;

  document.getElementById("phaseLabel").innerText = "READY";
  document.getElementById("exercise").innerText = "Ready";
  document.getElementById("timer").innerText = "00:00";
  document.getElementById("totalTime").innerText = "Total: 00:00";

  updateButtons();
}

/* =========================
   THEME
========================= */

function toggleTheme(){
  document.body.classList.toggle("light");
}

/* =========================
   SW
========================= */

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
