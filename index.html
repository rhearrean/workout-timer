<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Timer</title>
<link rel="manifest" href="manifest.json">

<style>
:root {
  --bg: #121212;
  --text: #ffffff;
  --accent: #007aff;
}
body {
  font-family: Arial;
  text-align: center;
  padding: 20px;
  background: var(--bg);
  color: var(--text);
}
.timer { font-size: 3em; margin: 20px; }
.exercise { font-size: 1.4em; margin: 10px; }
button { padding: 10px 20px; margin: 5px; }
.progress {
  width: 100%;
  height: 10px;
  background: #333;
  margin-top: 20px;
}
.progress-bar {
  height: 100%;
  width: 0%;
  background: var(--accent);
}
</style>
</head>

<body>

<h1>Warm-Up Timer</h1>

<div id="exercise">Ready</div>
<div class="timer" id="timer">00:00</div>
<div id="totalTime">Total: 00:00 / 02:00</div>

<div class="progress">
  <div class="progress-bar" id="progressBar"></div>
</div>

<button id="startBtn" onclick="handleStartStop()">Start</button>
<button onclick="pause()">Pause</button>
<button onclick="resume()">Resume</button>

<script>
// Workout
const workout = [
  { name: "Jumping Jacks", key: "jj", time: 30 },
  { name: "High Knees", key: "knees", time: 30 },
  { name: "Torso Twists + Arm Circles", key: "twists", time: 30 },
  { name: "Bodyweight Squats", key: "squats", time: 30 }
];

// State
let index = 0;
let timeLeft = 0;
let totalElapsed = 0;
let totalDuration = workout.reduce((a,b)=>a+b.time,0);

let interval = null;
let isPaused = false;
let isTransitioning = false;
let hasStarted = false;
let phase = "idle";

// timing engine
let startTime = 0;
let pausedAt = 0;
let remainingTime = 0;

// timeouts
let activeTimeouts = [];

// audio
const soundFiles = {
  start: "audio/start.wav",
  complete: "audio/complete.wav",
  jj_intro: "audio/jj_intro.wav",
  knees_intro: "audio/knees_intro.wav",
  twists_intro: "audio/twists_intro.wav",
  squats_intro: "audio/squats_intro.wav",
  halfway: "audio/halfway.wav"
};

let currentSound = null;

function playSound(name) {
  const src = soundFiles[name];
  if (!src) return null;

  const audio = new Audio(src);
  if (currentSound) currentSound.pause();
  currentSound = audio;

  audio.play().catch(()=>{});
  return audio;
}

function safeTimeout(fn, delay){
  const id = setTimeout(fn, delay);
  activeTimeouts.push(id);
  return id;
}

function clearAllTimeouts(){
  activeTimeouts.forEach(t=>clearTimeout(t));
  activeTimeouts=[];
}

function format(sec){
  return `${String(Math.floor(sec/60)).padStart(2,'0')}:${String(sec%60).padStart(2,'0')}`;
}

function update(){
  document.getElementById("exercise").innerText = workout[index].name;
  document.getElementById("timer").innerText = format(timeLeft);
  document.getElementById("totalTime").innerText =
    `Total: ${format(totalElapsed)} / ${format(totalDuration)}`;
  document.getElementById("progressBar").style.width =
    (totalElapsed/totalDuration)*100+"%";
}

// START / STOP
function handleStartStop(){
  if(!hasStarted){
    start();
  } else {
    stop();
  }
}

function start(){
  hasStarted = true;
  document.getElementById("startBtn").innerText = "Stop";

  isPaused = false;
  index = 0;
  totalElapsed = 0;

  playSound("start");
  startExercise(index);
}

function stop(){
  clearInterval(interval);
  clearAllTimeouts();

  if(currentSound) currentSound.pause();

  hasStarted = false;
  isPaused = false;
  phase = "idle";

  document.getElementById("startBtn").innerText = "Start";
  document.getElementById("exercise").innerText = "Stopped";
  document.getElementById("timer").innerText = "00:00";
}

// Exercise start
function startExercise(i){
  isTransitioning = true;
  phase = "countdown";

  let audioDone=false;
  let countdownDone=false;

  const intro = playSound(workout[i].key+"_intro");

  document.getElementById("exercise").innerText = workout[i].name;

  document.getElementById("timer").innerText="00:03";

  safeTimeout(()=>{document.getElementById("timer").innerText="00:02";},1000);
  safeTimeout(()=>{document.getElementById("timer").innerText="00:01";},2000);

  safeTimeout(()=>{
    countdownDone=true;
    tryStart();
  },3000);

  function tryStart(){
    if(!audioDone || !countdownDone || isPaused) return;

    isTransitioning=false;
    phase="exercise";

    remainingTime = workout[i].time * 1000;
    startTime = Date.now();

    interval = setInterval(tick,100);
  }

  if(intro){
    intro.onended=()=>{audioDone=true;tryStart();};
    safeTimeout(()=>{audioDone=true;tryStart();},4000);
  } else audioDone=true;
}

// TICK (accurate timer)
function tick(){
  if(isPaused || isTransitioning) return;

  const elapsed = Date.now() - startTime;
  const leftMs = remainingTime - elapsed;

  timeLeft = Math.max(0, Math.ceil(leftMs/1000));
  totalElapsed++;

  update();

  if(timeLeft === Math.floor(workout[index].time/2)){
    playSound("halfway");
  }

  if(leftMs <= 0){
    clearInterval(interval);

    index++;

    if(index >= workout.length){
      playSound("complete");
      document.getElementById("exercise").innerText="Workout Complete";
      document.getElementById("timer").innerText="00:00";

      hasStarted=false;
      document.getElementById("startBtn").innerText="Start";
      return;
    }

    startExercise(index);
  }
}

// PAUSE
function pause(){
  if(isPaused) return;

  isPaused=true;
  clearInterval(interval);
  pausedAt = Date.now();

  if(currentSound) currentSound.pause();
}

// RESUME
function resume(){
  if(!isPaused) return;

  isPaused=false;

  if(phase==="exercise"){
    const pauseDur = Date.now() - pausedAt;
    startTime += pauseDur;
    interval = setInterval(tick,100);
  }

  if(phase==="countdown"){
    startExercise(index);
  }
}
</script>

<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
