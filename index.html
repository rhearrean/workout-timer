<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Timer Stable</title>

<style>
body {
  font-family: Arial;
  text-align:center;
  padding:20px;
  background:#121212;
  color:#fff;
}

.timer { font-size:3em; margin:20px; }
button { padding:10px 20px; margin:5px; }
#panel { margin-top:15px; padding:10px; border:1px solid #333; }
</style>
</head>

<body>

<h1>Workout</h1>

<div id="phase">READY</div>
<div id="exercise">Ready</div>

<div class="timer" id="timer">00:00</div>
<div id="totalTime">Total: 00:00</div>

<button onclick="start()">Start</button>
<button onclick="pause()">Pause</button>
<button onclick="stop()">Stop</button>

<div id="panel">
  <input id="timeInput" type="number" value="30">
</div>

<script>

/* =========================
   DATA
========================= */

const workout = [
  { name:"Jumping Jacks" },
  { name:"High Knees" },
  { name:"Twists" },
  { name:"Squats" }
];

/* =========================
   STATE (MINIMAL)
========================= */

const state = {
  mode: "idle",
  index: 0,

  sessionStart: 0,
  pausedAt: 0,
  pausedTotal: 0,

  phaseStart: 0,
  phaseDuration: 0
};

let loop = null;

/* =========================
   FORMAT
========================= */

function format(sec){
  const m = Math.floor(sec/60);
  const s = sec%60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

/* =========================
   START SESSION
========================= */

function start(){

  if(loop) clearInterval(loop);

  state.mode = "countdown";
  state.index = 0;

  state.sessionStart = Date.now();
  state.pausedTotal = 0;

  runCountdown(startExercise);

  loop = setInterval(tick, 100);
}

/* =========================
   STOP
========================= */

function stop(){

  clearInterval(loop);
  loop = null;

  state.mode = "idle";
  state.index = 0;

  document.getElementById("timer").innerText = "00:00";
  document.getElementById("totalTime").innerText = "Total: 00:00";
}

/* =========================
   PAUSE (SIMPLE)
========================= */

function pause(){

  if(state.mode === "paused"){
    state.pausedTotal += Date.now() - state.pausedAt;
    state.mode = "exercise";
  } else {
    state.pausedAt = Date.now();
    state.mode = "paused";
  }
}

/* =========================
   COUNTDOWN (NO STATE IMPACT)
========================= */

function runCountdown(done){

  const steps = ["5","4","3","2","1"];
  const start = Date.now();

  const c = setInterval(() => {

    const i = Math.floor((Date.now() - start) / 1000);

    if(i >= steps.length){
      clearInterval(c);
      done();
      return;
    }

    document.getElementById("timer").innerText = steps[i];

  }, 50);
}

/* =========================
   START EXERCISE
========================= */

function startExercise(){

  state.mode = "exercise";

  state.phaseStart = Date.now();
  state.phaseDuration =
    (parseInt(document.getElementById("timeInput").value) || 30) * 1000;

  document.getElementById("phase").innerText = "WARMUP";
}

/* =========================
   MAIN LOOP (SINGLE SOURCE OF TRUTH)
========================= */

function tick(){

  if(state.mode !== "exercise") return;

  const now = Date.now();

  const elapsedSession =
    now - state.sessionStart - state.pausedTotal;

  document.getElementById("totalTime").innerText =
    "Total: " + format(Math.floor(elapsedSession/1000));

  const elapsedPhase =
    now - state.phaseStart;

  const remaining =
    state.phaseDuration - elapsedPhase;

  const sec = Math.max(0, Math.ceil(remaining/1000));

  document.getElementById("timer").innerText =
    `00:${String(sec).padStart(2,'0')}`;

  document.getElementById("exercise").innerText =
    workout[state.index].name;

  if(remaining <= 0){

    state.index++;

    if(state.index >= workout.length){
      stop();
      return;
    }

    runCountdown(startExercise);
  }
}

/* =========================
   INIT EXERCISE FLOW
========================= */

function startExercise(){

  state.mode = "exercise";

  state.phaseStart = Date.now();

  state.phaseDuration =
    (parseInt(document.getElementById("timeInput").value) || 30) * 1000;

  document.getElementById("phase").innerText = "WARMUP";
}

</script>

</body>
</html>
