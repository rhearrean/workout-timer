<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Timer</title>
<link rel="manifest" href="manifest.json">

<style>
:root {
  --bg: #121212;
  --text: #ffffff;
}

body.light {
  --bg: #ffffff;
  --text: #000000;
}

body {
  font-family: Arial;
  text-align: center;
  padding: 20px;
  background: var(--bg);
  color: var(--text);
}

.timer {
  font-size: 3em;
  margin: 20px;
}

button {
  padding: 10px 20px;
  margin: 5px;
}

button:disabled {
  opacity: 0.4;
}

#settingsPanel {
  margin-top: 15px;
  padding: 10px;
  border: 1px solid #333;
  border-radius: 8px;
}
</style>
</head>

<body>

<h1>My Workout Routine</h1>

<div id="phase">READY</div>
<div id="exercise">Ready</div>

<div class="timer" id="timer">00:00</div>

<div id="totalTime">Total: 00:00</div>

<button onclick="start()" id="startBtn">Start</button>
<button onclick="pause()" id="pauseBtn">Pause</button>
<button onclick="toggleTheme()" id="themeBtn">🌙</button>

<!-- =========================
     SETTINGS PANEL
========================= -->

<div id="settingsPanel">

  <h3 style="margin:0 0 10px 0;">Settings</h3>

  <div style="margin-bottom:10px;">
    <label>Warmup Time (sec):</label>

    <input
      id="timeInput"
      type="number"
      value="30"
      min="5"
      max="300"
    >
  </div>

  <div style="margin-bottom:10px;">
    <label>
      <input type="checkbox" id="countdownToggle" checked>
      Enable 5–4–3–2–1 Countdown
    </label>
  </div>

  <button onclick="resetDefaults()">
    Reset to Default
  </button>

</div>

<script>

/* =========================
   WORKOUT DATA
========================= */

const workout = [
  { name: "Jumping Jacks", time: 30 },
  { name: "High Knees", time: 30 },
  { name: "Twists", time: 30 },
  { name: "Squats", time: 30 }
];

/* =========================
   STATE
========================= */

const state = {
  running: false,
  paused: false,
  countdownActive: false,
  useCountdown: true,

  index: 0,
  phase: "idle",

  phaseStart: 0,
  phaseDuration: 0,

  remaining: 0
};

/* =========================
   GLOBAL TIMERS
========================= */

let loop = null;

let exerciseStartTime = 0;
let pausedAt = 0;
let totalPausedTime = 0;

/* =========================
   HELPERS
========================= */

function format(sec){
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

/* =========================
   UI
========================= */

function updateUI(){
  document.getElementById("exercise").innerText =
    workout[state.index]?.name || "Done";
}

function updateButtons(){
  document.getElementById("startBtn").innerText =
    state.running ? "Stop" : "Start";

  document.getElementById("pauseBtn").innerText =
    state.paused ? "Resume" : "Pause";
}

/* =========================
   COUNTDOWN (UI ONLY)
========================= */

function runPreCountdown(callback){

  const steps = ["5","4","3","2","1"];
  let i = 0;

  state.countdownActive = true;
  document.getElementById("phase").innerText = "GET READY";

  const c = setInterval(() => {

    document.getElementById("timer").innerText = steps[i];
    i++;

    if(i >= steps.length){

      clearInterval(c);
      state.countdownActive = false;

      setTimeout(() => {
        callback();
      }, 50);
    }

  }, 1000);
}

/* =========================
   START EXERCISE (ONLY TIME CONTROLLER)
========================= */

function startExercise(){

  const customTime =
    parseInt(document.getElementById("timeInput").value) || 30;

  const beginExercise = () => {

    state.phase = "exercise";
    state.phaseStart = Date.now();
    state.phaseDuration = customTime * 1000;

    if(exerciseStartTime === 0){
      exerciseStartTime = Date.now();
    }

    document.getElementById("phase").innerText = "WARMUP";
    document.getElementById("exercise").innerText =
      workout[state.index].name;
  };

  if(state.index === 0){
    beginExercise();
    return;
  }

  if(state.useCountdown){
    runPreCountdown(beginExercise);
  } else {
    beginExercise();
  }
}

/* =========================
   START / STOP
========================= */

function start(){

  if(state.running){
    stop();
    return;
  }

  setInputLock(true);

  state.running = true;
  state.paused = false;
  state.index = 0;

  exerciseStartTime = 0;
  totalPausedTime = 0;

  state.useCountdown =
    document.getElementById("countdownToggle").checked;

  updateButtons();

  runPreCountdown(() => startExercise());

  loop = setInterval(tick, 100);
}

function stop(){

  setInputLock(false);

  state.running = false;
  state.paused = false;
  state.countdownActive = false;
  state.index = 0;

  exerciseStartTime = 0;
  totalPausedTime = 0;

  clearInterval(loop);
  loop = null;

  document.getElementById("timer").innerText = "00:00";
  document.getElementById("totalTime").innerText = "Total: 00:00";
  document.getElementById("exercise").innerText = "Ready";

  updateButtons();
}

/* =========================
   PAUSE / RESUME
========================= */

function pause(){

  if(!state.running) return;

  state.paused = !state.paused;

  if(state.paused){

    pausedAt = Date.now();

    clearInterval(loop);
    loop = null;

    state.remaining =
      state.phaseDuration -
      (Date.now() - state.phaseStart);

  } else {

    totalPausedTime += Date.now() - pausedAt;

    state.phaseStart =
      Date.now() -
      (state.phaseDuration - state.remaining);

    loop = setInterval(tick, 100);
  }

  updateButtons();
}

/* =========================
   MAIN LOOP
========================= */

function tick(){

  if(state.countdownActive) return;
  if(!state.running || state.paused) return;

  const now = Date.now();

  const remaining =
    state.phaseDuration - (now - state.phaseStart);

  const sec =
    Math.max(0, Math.ceil(remaining / 1000));

  document.getElementById("timer").innerText =
    `00:${String(sec).padStart(2,'0')}`;

  updateUI();

  /* TOTAL TIME */
  if(state.phase === "exercise" && exerciseStartTime > 0){

    const total =
      Math.floor(
        (Date.now() - exerciseStartTime - totalPausedTime) / 1000
      );

    document.getElementById("totalTime").innerText =
      `Total: ${format(total)}`;
  }

  /* NEXT EXERCISE */
  if(remaining <= 0){

    state.index++;

    if(state.index >= workout.length){
      stop();
      return;
    }

    startExercise();
  }
}

/* =========================
   UI SETTINGS
========================= */

function setInputLock(locked){

  document.getElementById("timeInput").disabled = locked;
  document.getElementById("countdownToggle").disabled = locked;

  document.querySelector(
    "button[onclick='resetDefaults()']"
  ).disabled = locked;
}

function resetDefaults(){
  document.getElementById("timeInput").value = 30;
  document.getElementById("countdownToggle").checked = true;
}

function toggleTheme(){
  document.body.classList.toggle("light");
}

updateButtons();

</script>

</body>
</html>
