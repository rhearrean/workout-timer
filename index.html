<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Timer</title>
<link rel="manifest" href="manifest.json">

<style>
:root {
  --bg:#121212;
  --text:#fff;
  --accent:#007aff;
}

body.light {
  --bg:#fff;
  --text:#000;
}

body {
  font-family: Arial;
  text-align:center;
  padding:20px;
  background:var(--bg);
  color:var(--text);
}

.timer { font-size:3em; margin:20px; }
button { padding:10px 20px; margin:5px; }

.progress {
  width:100%;
  height:10px;
  background:#333;
}
.progress-bar {
  height:100%;
  width:0%;
  background:var(--accent);
}
</style>
</head>

<body>

<h1>My Workout Routine</h1>

<div id="phaseLabel">READY</div>
<div id="exercise">Ready</div>

<div class="timer" id="timer">00:00</div>

<div id="totalTime">Total: 00:00</div>

<div class="progress">
  <div class="progress-bar" id="progressBar"></div>
</div>

<button onclick="start()" id="startBtn">Start</button>
<button onclick="togglePause()">Pause</button>

<script>

/* =========================
   DATA
========================= */

const warmup = [
  { name:"Jumping Jacks", key:"jj", time:30 },
  { name:"High Knees", key:"knees", time:30 },
  { name:"Torso Twists + Arm Circles", key:"twists", time:30 },
  { name:"Bodyweight Squats", key:"squats", time:30 }
];

const workout = {
  rounds: 3,
  exercises: [
    { name:"Plank Taps", key:"plank_taps", time:40 }
  ],
  rest: 20
};

/* =========================
   STATE
========================= */

let mode = "idle";
let index = 0;
let round = 1;

let running = false;
let paused = false;

let phaseStart = 0;
let phaseDuration = 0;

let workoutStart = 0;
let pausedAt = 0;

let interval = null;

/* =========================
   AUDIO
========================= */

const audioPool = {};

const sounds = {
  start:"audio/start.wav",
  complete:"audio/complete.wav",
  halfway:"audio/halfway.wav",

  jj_intro:"audio/jj_intro.wav",
  knees_intro:"audio/knees_intro.wav",
  twists_intro:"audio/twists_intro.wav",
  squats_intro:"audio/squats_intro.wav",
  plank_taps_intro:"audio/plank_taps_intro.wav"
};

function initAudio(){
  Object.entries(sounds).forEach(([k,s])=>{
    audioPool[k] = new Audio(s);
  });
}

function playSound(k){
  const a = audioPool[k];
  if(!a) return;
  a.pause();
  a.currentTime = 0;
  a.play().catch(()=>{});
}

/* =========================
   START
========================= */

function start(){

  if(running){
    stop();
    return;
  }

  if(Object.keys(audioPool).length === 0)
    initAudio();

  running = true;
  paused = false;

  index = 0;
  round = 1;
  mode = "warmup";

  workoutStart = Date.now();

  document.getElementById("startBtn").innerText = "Stop";
  document.getElementById("phaseLabel").innerText = "GET READY";
  document.getElementById("exercise").innerText = "";

  /* 🔥 LONGER SAFE BUFFER FOR iPHONE */
  setTimeout(()=>{

    playSound("start");

    /* WAIT BEFORE COUNTDOWN STARTS */
    setTimeout(()=>{

      run531Countdown();

    }, 900);

  }, 700);
}

/* =========================
   5–3–1 COUNTDOWN
========================= */

function run531Countdown(){

  let count = 5;

  const timer = setInterval(()=>{

    document.getElementById("timer").innerText =
      `00:0${count}`;

    count--;

    if(count < 0){

      clearInterval(timer);

      startWarmup();

      interval = setInterval(tick, 100);
    }

  }, 1000);
}

/* =========================
   STOP
========================= */

function stop(){

  clearInterval(interval);

  running = false;
  paused = false;

  mode = "idle";
  index = 0;
  round = 1;

  document.getElementById("startBtn").innerText = "Start";
  document.getElementById("exercise").innerText = "Ready";
  document.getElementById("phaseLabel").innerText = "READY";
  document.getElementById("timer").innerText = "00:00";
}

/* =========================
   FLOW
========================= */

function startWarmup(){
  mode = "warmup";
  startPhase(warmup[index]);
}

function startWorkout(){
  mode = "workout";
  startPhase(workout.exercises[0]);
}

function startPhase(item){

  phaseStart = Date.now();
  phaseDuration = item.time * 1000;

  playSound(item.key + "_intro");
}

/* =========================
   LOOP
========================= */

function tick(){

  if(!running || paused) return;

  const now = Date.now();
  const remaining = phaseDuration - (now - phaseStart);

  const timeLeft = Math.max(0, Math.ceil(remaining/1000));

  document.getElementById("timer").innerText =
    `00:${String(timeLeft).padStart(2,'0')}`;

  if(mode === "warmup"){

    document.getElementById("phaseLabel").innerText = "WARMUP";
    document.getElementById("exercise").innerText = warmup[index].name;

    if(remaining <= 0){

      index++;

      if(index >= warmup.length){
        startWorkout();
        return;
      }

      startPhase(warmup[index]);
    }
  }

  else if(mode === "workout"){

    const ex = workout.exercises[0];

    document.getElementById("phaseLabel").innerText =
      `WORKOUT - ROUND ${round}`;

    document.getElementById("exercise").innerText = ex.name;

    if(remaining <= 0){

      phaseStart = Date.now();
      phaseDuration = workout.rest * 1000;

      index++;

      if(index > 0){
        index = 0;
        round++;

        if(round > workout.rounds){
          playSound("complete");
          stop();
          return;
        }
      }

      startPhase(ex);
    }
  }

  updateUI();
}

/* =========================
   UI
========================= */

function updateUI(){

  const total = Math.floor((Date.now()-workoutStart)/1000);

  const m = Math.floor(total/60);
  const s = total % 60;

  document.getElementById("totalTime").innerText =
    `Total: ${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

/* =========================
   PAUSE
========================= */

function togglePause(){

  if(!running) return;

  if(!paused){
    paused = true;
    pausedAt = Date.now();
  } else {
    paused = false;
    const diff = Date.now() - pausedAt;
    phaseStart += diff;
    workoutStart += diff;
  }
}

/* =========================
   SW
========================= */

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
