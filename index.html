<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Timer (Final Stable)</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  padding: 20px;
  background: #121212;
  color: white;
}

.timer {
  font-size: 3em;
  margin: 20px;
}

button {
  padding: 10px 20px;
  margin: 5px;
}
</style>
</head>

<body>

<h1>Workout Timer</h1>

<div id="phase">READY</div>
<div id="exercise">Ready</div>

<div class="timer" id="timer">00:00</div>
<div id="totalTime">Total: 00:00</div>

<button onclick="start()">Start</button>
<button onclick="stop()">Stop</button>

<script>

/* =========================
   WORKOUT DATA
========================= */

const workout = [
  "Jumping Jacks",
  "High Knees",
  "Twists",
  "Squats"
];

/* =========================
   STATE
========================= */

let index = 0;

let sessionStart = 0;     // 🔥 TOTAL TIME STARTS HERE (after countdown)
let pausedTotal = 0;
let pausedAt = 0;

let phaseStart = 0;
let phaseDuration = 30000;

let loop = null;
let countdownRunning = false;

/* =========================
   FORMAT
========================= */

function format(sec){
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

/* =========================
   START
========================= */

function start(){

  stop(); // full reset

  index = 0;
  sessionStart = 0;
  pausedTotal = 0;

  loop = setInterval(tick, 100);

  runCountdown(beginExercise);
}

/* =========================
   STOP
========================= */

function stop(){

  clearInterval(loop);
  loop = null;

  index = 0;
  sessionStart = 0;
  pausedTotal = 0;

  document.getElementById("timer").innerText = "00:00";
  document.getElementById("totalTime").innerText = "Total: 00:00";
  document.getElementById("exercise").innerText = "Ready";
  document.getElementById("phase").innerText = "READY";
}

/* =========================
   COUNTDOWN (VISUAL ONLY)
========================= */

function runCountdown(done){

  countdownRunning = true;

  const steps = ["5","4","3","2","1"];
  const start = Date.now();

  const c = setInterval(() => {

    const i = Math.floor((Date.now() - start) / 1000);

    if(i >= steps.length){
      clearInterval(c);
      countdownRunning = false;
      done();
      return;
    }

    document.getElementById("timer").innerText = steps[i];

  }, 50);
}

/* =========================
   BEGIN EXERCISE
========================= */

function beginExercise(){

  // 🔥 IMPORTANT FIX: TOTAL TIMER STARTS HERE
  if(sessionStart === 0){
    sessionStart = Date.now();
  }

  phaseStart = Date.now();

  document.getElementById("phase").innerText = "WARMUP";
  document.getElementById("exercise").innerText = workout[index];
}

/* =========================
   MAIN LOOP
========================= */

function tick(){

  if(countdownRunning) return;

  const now = Date.now();

  /* TOTAL TIME (ONLY STARTS AFTER COUNTDOWN) */
  if(sessionStart){

    const total =
      Math.floor((now - sessionStart - pausedTotal) / 1000);

    document.getElementById("totalTime").innerText =
      "Total: " + format(total);
  }

  /* EXERCISE TIMER */
  const remaining =
    phaseDuration - (now - phaseStart);

  const sec = Math.max(0, Math.ceil(remaining / 1000));

  document.getElementById("timer").innerText =
    `00:${String(sec).padStart(2,'0')}`;

  /* NEXT EXERCISE */
  if(remaining <= 0){

    index++;

    if(index >= workout.length){
      stop();
      return;
    }

    runCountdown(beginExercise);
  }
}

</script>

</body>
</html>
