<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Workout Fix Final</title>

<style>
body { font-family: Arial; text-align:center; padding:20px; }
.timer { font-size:3em; margin:20px; }
</style>
</head>

<body>

<h1>Workout</h1>

<div id="phase">READY</div>
<div id="exercise">Ready</div>

<div class="timer" id="timer">00:00</div>
<div id="totalTime">Total: 00:00</div>

<button onclick="start()">Start</button>
<button onclick="stop()">Stop</button>

<script>

/* =========================
   DATA
========================= */

const workout = [
  { name:"Jumping Jacks" },
  { name:"High Knees" },
  { name:"Twists" },
  { name:"Squats" }
];

/* =========================
   STATE
========================= */

let index = 0;

let sessionStart = 0;
let pausedTotal = 0;
let pausedAt = 0;

let phaseStart = 0;
let phaseDuration = 0;

let mode = "idle";
let loop = null;

/* =========================
   FORMAT
========================= */

function format(sec){
  const m = Math.floor(sec/60);
  const s = sec%60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

/* =========================
   START (KEY FIX HERE)
========================= */

function start(){

  stop(); // reset cleanly

  mode = "countdown";

  index = 0;

  // 🔥 IMPORTANT: session starts HERE (no matter countdown)
  sessionStart = Date.now();
  pausedTotal = 0;

  runCountdown(() => beginWorkout());

  loop = setInterval(tick, 100);
}

/* =========================
   STOP
========================= */

function stop(){

  clearInterval(loop);
  loop = null;

  mode = "idle";

  index = 0;
  sessionStart = 0;
  pausedTotal = 0;

  document.getElementById("timer").innerText = "00:00";
  document.getElementById("totalTime").innerText = "Total: 00:00";
}

/* =========================
   COUNTDOWN (UI ONLY)
========================= */

function runCountdown(done){

  const steps = ["5","4","3","2","1"];
  const start = Date.now();

  const c = setInterval(() => {

    const i = Math.floor((Date.now() - start) / 1000);

    if(i >= steps.length){
      clearInterval(c);
      done();
      return;
    }

    document.getElementById("timer").innerText = steps[i];

  }, 50);
}

/* =========================
   BEGIN WORKOUT (NO SESSION RESET HERE)
========================= */

function beginWorkout(){

  mode = "exercise";

  phaseStart = Date.now();

  phaseDuration = 30000;

  document.getElementById("phase").innerText = "WARMUP";

  document.getElementById("exercise").innerText =
    workout[index].name;
}

/* =========================
   LOOP
========================= */

function tick(){

  if(mode !== "exercise") return;

  const now = Date.now();

  /* TOTAL TIME (ALWAYS FROM BUTTON PRESS) */
  const total =
    Math.floor((now - sessionStart - pausedTotal) / 1000);

  document.getElementById("totalTime").innerText =
    "Total: " + format(total);

  /* EXERCISE TIMER */
  const remaining =
    phaseDuration - (now - phaseStart);

  const sec = Math.max(0, Math.ceil(remaining/1000));

  document.getElementById("timer").innerText =
    `00:${String(sec).padStart(2,'0')}`;

  /* NEXT */
  if(remaining <= 0){

    index++;

    if(index >= workout.length){
      stop();
      return;
    }

    runCountdown(() => beginWorkout());
  }
}

</script>

</body>
</html>
