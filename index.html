<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Fit Timer</title>
  <meta name="theme-color" content="#111111" />

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="stylesheet" href="style.css" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Fit Timer" />
</head>
<body>
  <main class="container">
    <header class="app-header">
      <h1>Fit Timer</h1>
      <span class="version-badge">v3.2</span>
    </header>

    <section id="completedScreen" class="completed-screen" style="display:none;">
      <div class="completed-icon">✅</div>
      <h2>All done today</h2>
      <p>Abs Circuit and Pushups are complete. Nothing else to do today.</p>
    </section>

    <section class="top-card app-section">
      <label for="workoutSelect">Workout</label>
      <select id="workoutSelect">
        <option value="abs">Abs Circuit</option>
        <option value="pushups">Pushup Sets</option>
      </select>

      <button id="settingsBtn" class="secondary-btn">Settings</button>
    </section>

    <section id="settingsPanel" class="settings-panel app-section" style="display:none;">
      <h2>Settings</h2>

      <label for="pushupRestSelect">Pushup Rest</label>
      <select id="pushupRestSelect">
        <option value="60">60 seconds</option>
        <option value="90">90 seconds</option>
      </select>

      <label for="absRoundsSelect">Ab Circuit Rounds</label>
      <select id="absRoundsSelect">
        <option value="1">1 round</option>
        <option value="2">2 rounds</option>
        <option value="3">3 rounds</option>
        <option value="4">4 rounds</option>
        <option value="5">5 rounds</option>
      </select>

      <button id="closeSettingsBtn" class="secondary-btn">Close</button>
    </section>

    <section id="dailyStatus" class="daily-status app-section">
      <div id="absStatus">Abs Circuit: Not done today</div>
      <div id="pushupStatus">Pushups: Not done today</div>
    </section>

    <section class="timer-card app-section">
      <div id="phase">Ready</div>
      <div id="exercise">Press Start</div>
      <div id="nextExercise"></div>
      <div id="timer">0</div>
    </section>

    <section class="button-row app-section">
      <button id="startBtn">Start</button>
      <button id="completeSetBtn" style="display:none;">Complete Set</button>
      <button id="resetBtn" class="secondary-btn">Reset</button>
    </section>
  </main>

  <script src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js");
    }
  </script>
</body>
</html>
