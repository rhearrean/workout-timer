<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Timer</title>
<link rel="manifest" href="manifest.json">

<style>
:root {
  --bg: #ffffff;
  --text: #000000;
  --accent: #007aff;
}

body.dark {
  --bg: #121212;
  --text: #ffffff;
}

body {
  font-family: Arial;
  text-align: center;
  padding: 20px;
  background: var(--bg);
  color: var(--text);
}

.timer { font-size: 3em; margin: 20px; }
.exercise { font-size: 1.4em; margin: 10px; }

button {
  padding: 10px 20px;
  margin: 5px;
}

.icon-btn {
  font-size: 1.5em;
}

.progress {
  width: 100%;
  height: 10px;
  background: #ccc;
  margin-top: 20px;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: var(--accent);
}
</style>
</head>

<body>

<h1>Warm-Up Timer</h1>

<div class="exercise" id="exercise">Ready</div>
<div class="timer" id="timer">00:30</div>
<div id="totalTime">Total: 00:00 / 02:00</div>

<div class="progress">
  <div class="progress-bar" id="progressBar"></div>
</div>

<button onclick="start()">Start</button>
<button onclick="pause()">Pause</button>
<button onclick="resume()">Resume</button>
<button class="icon-btn" onclick="toggleDark()" id="themeBtn">🌙</button>

<script>
const workout = [
  { name: "Jumping Jacks", time: 30 },
  { name: "High Knees", time: 30 },
  { name: "Torso Twists + Arm Circles", time: 30 },
  { name: "Bodyweight Squats", time: 30 }
];

let index = 0;
let timeLeft = workout[0].time;
let totalElapsed = 0;
let totalDuration = workout.reduce((sum, ex) => sum + ex.time, 0);
let interval;

let audioCtx;
let voiceReady = false;
let selectedVoice = null;

// 🔊 Audio unlock (iPhone)
function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

// 🔊 Beep
function beep() {
  if (!audioCtx) return;

  const osc = audioCtx.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(800, audioCtx.currentTime);

  osc.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.2);

  if (navigator.vibrate) navigator.vibrate(200);
}

// 🎧 Load voices properly (iOS fix)
function loadVoices() {
  return new Promise(resolve => {
    let voices = speechSynthesis.getVoices();

    if (voices.length) {
      resolve(voices);
    } else {
      speechSynthesis.onvoiceschanged = () => {
        resolve(speechSynthesis.getVoices());
      };
    }
  });
}

// 🎧 Initialize voice system
async function initVoice() {
  if (voiceReady) return;

  const voices = await loadVoices();

  selectedVoice =
    voices.find(v => v.name.includes("Samantha")) ||
    voices.find(v => v.lang === "en-US") ||
    voices[0];

  const msg = new SpeechSynthesisUtterance(" ");
  msg.voice = selectedVoice;
  speechSynthesis.speak(msg);

  voiceReady = true;
}

// 🎧 Speak safely
function speak(text) {
  if (!voiceReady || !selectedVoice) return;

  speechSynthesis.cancel();

  const msg = new SpeechSynthesisUtterance(text);
  msg.voice = selectedVoice;
  msg.rate = 1;
  msg.pitch = 1;

  speechSynthesis.speak(msg);
}

// ⏱ Format time
function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

// 🔄 Update UI
function update() {
  document.getElementById("exercise").innerText = workout[index].name;
  document.getElementById("timer").innerText = formatTime(timeLeft);

  document.getElementById("totalTime").innerText =
    `Total: ${formatTime(totalElapsed)} / ${formatTime(totalDuration)}`;

  let progress = (totalElapsed / totalDuration) * 100;
  document.getElementById("progressBar").style.width = progress + "%";
}

// ▶️ Start
async function start() {
  if (interval) return;

  initAudio();
  await initVoice(); // 🔑 critical for iPhone

  speak("Begin warm up");

  update();
  interval = setInterval(tick, 1000);
}

// 🔁 Tick
function tick() {
  timeLeft--;
  totalElapsed++;

  // ⏳ Last 5 seconds countdown
  if (timeLeft <= 5 && timeLeft > 0) {
    speak(timeLeft.toString());
  }

  if (timeLeft <= 0) {
    beep();
    index++;

    if (index >= workout.length) {
      clearInterval(interval);
      speak("Workout complete");
      document.getElementById("exercise").innerText = "Done!";
      return;
    }

    setTimeout(() => {
      speak("Next: " + workout[index].name);
    }, 200);

    timeLeft = workout[index].time;
  }

  update();
}

// ⏸ Pause
function pause() {
  clearInterval(interval);
  interval = null;
  speechSynthesis.cancel();
}

// ▶️ Resume
function resume() {
  if (!interval) interval = setInterval(tick, 1000);
}

// 🌙 Toggle Dark Mode
function toggleDark() {
  document.body.classList.toggle("dark");
  const btn = document.getElementById("themeBtn");

  if (document.body.classList.contains("dark")) {
    btn.innerText = "☀️";
  } else {
    btn.innerText = "🌙";
  }
}
</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
