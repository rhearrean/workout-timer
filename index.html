<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Timer</title>
<link rel="manifest" href="manifest.json">

<style>
:root {
  --bg: #121212;
  --text: #ffffff;
  --accent: #007aff;
}
body.light { --bg:#fff; --text:#000; }

body {
  font-family: Arial;
  text-align: center;
  padding: 20px;
  background: var(--bg);
  color: var(--text);
}

.timer { font-size: 3em; margin: 20px; }
button { padding: 10px 20px; margin: 5px; }
.icon-btn { font-size: 1.5em; }

.progress {
  width: 100%;
  height: 10px;
  background: #333;
}
.progress-bar {
  height: 100%;
  width: 0%;
  background: var(--accent);
}
</style>
</head>

<body>

<h1 id="modeTitle">Warm-Up Timer</h1>

<div id="phaseLabel">Ready</div>
<div id="exercise">Ready</div>

<div class="timer" id="timer">00:00</div>

<div id="totalTime">Total: 00:00</div>

<div class="progress">
  <div class="progress-bar" id="progressBar"></div>
</div>

<button id="startBtn" onclick="handleStartStop()">Start</button>
<button id="pauseBtn" onclick="togglePause()">Pause</button>
<button class="icon-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>

<script>

/* =======================
   WARMUP (UNCHANGED)
======================= */
const workout = [
  { name:"Jumping Jacks", key:"jj", time:30 },
  { name:"High Knees", key:"knees", time:30 },
  { name:"Torso Twists + Arm Circles", key:"twists", time:30 },
  { name:"Bodyweight Squats", key:"squats", time:30 }
];

/* =======================
   WORKOUT CIRCUIT (NEW)
======================= */
const circuit = {
  rounds: 3,
  exercises: [
    { name:"Plank Taps", key:"plank_taps" }
  ],
  workTime: 40,
  restTime: 20
};

/* =======================
   STATE
======================= */
let index = 0;
let interval = null;
let hasStarted = false;
let isPaused = false;

let phase = "warmup"; // warmup | workout
let circuitRound = 1;
let circuitIndex = 0;

let phaseStartTime = 0;
let phaseDuration = 0;

let workoutStartTime = 0;
let pausedAt = 0;

let timeLeft = 0;

/* =======================
   AUDIO (UNCHANGED)
======================= */
const audioPool = {};
let audioUnlocked = false;

const soundFiles = {
  start:"audio/start.wav",
  complete:"audio/complete.wav",
  halfway:"audio/halfway.wav",
  jj_intro:"audio/jj_intro.wav",
  knees_intro:"audio/knees_intro.wav",
  twists_intro:"audio/twists_intro.wav",
  squats_intro:"audio/squats_intro.wav",
  plank_taps_intro:"audio/plank_taps_intro.wav"
};

function initAudio(){
  Object.entries(soundFiles).forEach(([k,s])=>{
    const a = new Audio(s);
    audioPool[k] = a;
  });
}

function unlockAudio(){
  if(audioUnlocked) return;
  Object.values(audioPool).forEach(a=>{
    a.volume = 0;
    a.play().then(()=>{
      a.pause();
      a.currentTime = 0;
      a.volume = 1;
    }).catch(()=>{});
  });
  audioUnlocked = true;
}

function playSound(n){
  const a = audioPool[n];
  if(!a) return;
  a.pause();
  a.currentTime = 0;
  a.play().catch(()=>{});
}

/* =======================
   START
======================= */
function handleStartStop(){
  if(!hasStarted) start();
  else stop();
}

function start(){
  if(Object.keys(audioPool).length === 0) initAudio();
  unlockAudio();

  hasStarted = true;
  isPaused = false;

  index = 0;
  circuitRound = 1;
  circuitIndex = 0;
  phase = "warmup";

  workoutStartTime = Date.now();

  document.getElementById("startBtn").innerText = "Stop";

  playSound("start");

  startWarmup();

  interval = setInterval(tick, 100);
}

/* =======================
   WARMUP
======================= */
function startWarmup(){
  phase = "warmup";
  startPhase(workout[index]);
}

/* =======================
   WORKOUT
======================= */
function startWorkout(){
  phase = "workout";

  const ex = circuit.exercises[circuitIndex];

  phaseDuration =
    circuit.workTime * 1000;

  phaseStartTime = Date.now();

  playSound(ex.key + "_intro");
}

/* =======================
   CORE PHASE START
======================= */
function startPhase(item){
  phaseStartTime = Date.now();
  phaseDuration = item.time * 1000;

  playSound(item.key + "_intro");
}

/* =======================
   TIMER
======================= */
function tick(){
  if(!hasStarted || isPaused) return;

  const now = Date.now();
  const remaining = phaseDuration - (now - phaseStartTime);

  timeLeft = Math.max(0, Math.ceil(remaining/1000));

  document.getElementById("timer").innerText =
    `00:${String(timeLeft).padStart(2,'0')}`;

  /* ================= WARMUP ================= */
  if(phase === "warmup"){

    document.getElementById("exercise").innerText =
      workout[index].name;

    document.getElementById("phaseLabel").innerText =
      "WARMUP";

    if(remaining <= 0){
      index++;

      if(index >= workout.length){
        circuitIndex = 0;
        startWorkout();
        return;
      }

      startPhase(workout[index]);
    }
  }

  /* ================= WORKOUT ================= */
  else if(phase === "workout"){

    const ex = circuit.exercises[circuitIndex];

    document.getElementById("exercise").innerText =
      ex.name;

    document.getElementById("phaseLabel").innerText =
      `WORKOUT - ROUND ${circuitRound}`;

    if(remaining <= 0){

      // REST
      circuitIndex++;

      if(circuitIndex >= circuit.exercises.length){
        circuitIndex = 0;
        circuitRound++;

        if(circuitRound > circuit.rounds){
          playSound("complete");
          stop();
          return;
        }
      }

      phaseDuration = circuit.restTime * 1000;
      phaseStartTime = Date.now();
    }
  }

  updateUI();
}

/* =======================
   UI
======================= */
function updateUI(){
  const totalSeconds = Math.floor((Date.now()-workoutStartTime)/1000);

  const minutes = Math.floor(totalSeconds / 60);
  const seconds = totalSeconds % 60;

  document.getElementById("totalTime").innerText =
    `Total: ${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')} / --`;

  const progress =
    (index + circuitRound / circuit.rounds) * 10;

  document.getElementById("progressBar").style.width =
    progress + "%";
}

/* =======================
   STOP
======================= */
function stop(){
  clearInterval(interval);

  hasStarted = false;
  phase = "idle";

  document.getElementById("startBtn").innerText = "Start";
  document.getElementById("exercise").innerText = "Ready";
}

/* =======================
   PAUSE
======================= */
function togglePause(){
  if(!hasStarted) return;

  if(!isPaused){
    isPaused = true;
    pausedAt = Date.now();
    document.getElementById("pauseBtn").innerText = "Resume";
  } else {
    isPaused = false;
    const diff = Date.now() - pausedAt;
    phaseStartTime += diff;
    workoutStartTime += diff;
    document.getElementById("pauseBtn").innerText = "Pause";
  }
}

/* =======================
   THEME
======================= */
function toggleTheme(){
  document.body.classList.toggle("light");
}

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js');
}

</script>
</body>
</html>
