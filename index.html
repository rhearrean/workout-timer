<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Timer</title>
<link rel="manifest" href="manifest.json">

<style>
:root {
  --bg: #121212;
  --text: #ffffff;
  --accent: #007aff;
}
body.light {
  --bg: #ffffff;
  --text: #000000;
}
body {
  font-family: Arial;
  text-align: center;
  padding: 20px;
  background: var(--bg);
  color: var(--text);
}
.timer { font-size: 3em; margin: 20px; }
button { padding: 10px 20px; margin: 5px; }
.icon-btn { font-size: 1.5em; }
.progress {
  width: 100%;
  height: 10px;
  background: #333;
}
.progress-bar {
  height: 100%;
  width: 0%;
  background: var(--accent);
}
</style>
</head>

<body>

<h1>Warm-Up Timer</h1>

<div id="exercise">Ready</div>
<div class="timer" id="timer">00:00</div>
<div id="totalTime">Total: 00:00 / 02:00</div>

<div class="progress">
  <div class="progress-bar" id="progressBar"></div>
</div>

<button id="startBtn" onclick="handleStartStop()">Start</button>
<button id="pauseBtn" onclick="togglePause()">Pause</button>
<button class="icon-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>

<script>
// ===== WORKOUT =====
const workout = [
  { name: "Jumping Jacks", key: "jj", time: 30 },
  { name: "High Knees", key: "knees", time: 30 },
  { name: "Torso Twists + Arm Circles", key: "twists", time: 30 },
  { name: "Bodyweight Squats", key: "squats", time: 30 }
];

// ===== STATE =====
let index = 0;
let timeLeft = 0;
let totalElapsed = 0;
let totalDuration = workout.reduce((a,b)=>a+b.time,0);

let interval = null;
let isPaused = false;
let hasStarted = false;

let phase = "idle"; // countdown | exercise
let phaseStartTime = 0;
let phaseDuration = 0;

let workoutStartTime = 0;
let pausedAt = 0;

let currentSound = null;

// ===== AUDIO =====
const soundFiles = {
  start: "audio/start.wav",
  complete: "audio/complete.wav",
  jj_intro: "audio/jj_intro.wav",
  knees_intro: "audio/knees_intro.wav",
  twists_intro: "audio/twists_intro.wav",
  squats_intro: "audio/squats_intro.wav",
  halfway: "audio/halfway.wav"
};

function playSound(name){
  const src = soundFiles[name];
  if(!src) return;

  const audio = new Audio(src);
  if(currentSound) currentSound.pause();
  currentSound = audio;
  audio.play().catch(()=>{});
}

// ===== HELPERS =====
function format(sec){
  return `${String(Math.floor(sec/60)).padStart(2,'0')}:${String(sec%60).padStart(2,'0')}`;
}

function update(){
  document.getElementById("exercise").innerText = workout[index]?.name || "Done";
  document.getElementById("timer").innerText = format(timeLeft);
  document.getElementById("totalTime").innerText =
    `Total: ${format(totalElapsed)} / ${format(totalDuration)}`;
  document.getElementById("progressBar").style.width =
    (totalElapsed/totalDuration)*100+"%";
}

// ===== START / STOP =====
function handleStartStop(){
  if(!hasStarted) start();
  else stop();
}

function start(){
  hasStarted = true;
  isPaused = false;

  index = 0;
  totalElapsed = 0;

  workoutStartTime = Date.now();

  document.getElementById("startBtn").innerText = "Stop";

  playSound("start");

  startExercise(index);

  interval = setInterval(tick, 100);
}

function stop(){
  clearInterval(interval);
  interval = null;

  if(currentSound) currentSound.pause();

  hasStarted = false;
  isPaused = false;
  phase = "idle";

  index = 0;
  timeLeft = 0;
  totalElapsed = 0;

  document.getElementById("startBtn").innerText = "Start";
  document.getElementById("pauseBtn").innerText = "Pause";
  document.getElementById("exercise").innerText = "Ready";
  document.getElementById("timer").innerText = "00:00";
  document.getElementById("progressBar").style.width = "0%";
}

// ===== EXERCISE =====
function startExercise(i){
  index = i;
  phase = "countdown";

  playSound(workout[i].key+"_intro");

  phaseStartTime = Date.now();
  phaseDuration = 3000;
}

// ===== TIMER ENGINE =====
function tick(){
  if(!hasStarted || isPaused) return;

  const now = Date.now();
  const elapsed = now - phaseStartTime;
  const remaining = phaseDuration - elapsed;

  // COUNTDOWN
  if(phase === "countdown"){
    const sec = Math.ceil(remaining / 1000);
    timeLeft = Math.max(0, sec);

    document.getElementById("exercise").innerText = workout[index].name;
    document.getElementById("timer").innerText = `00:0${timeLeft}`;

    if(remaining <= 0){
      phase = "exercise";
      phaseStartTime = Date.now();
      phaseDuration = workout[index].time * 1000;
    }
  }

  // EXERCISE
  else if(phase === "exercise"){
    const sec = Math.ceil(remaining / 1000);
    timeLeft = Math.max(0, sec);

    const totalMs = Date.now() - workoutStartTime;
    totalElapsed = Math.floor(totalMs / 1000);

    update();

    if(timeLeft === Math.floor(workout[index].time / 2)){
      playSound("halfway");
    }

    if(remaining <= 0){
      index++;

      if(index >= workout.length){
        playSound("complete");
        stop();
        return;
      }

      startExercise(index);
    }
  }
}

// ===== PAUSE =====
function togglePause(){
  if(!hasStarted) return;

  if(!isPaused){
    isPaused = true;
    pausedAt = Date.now();
    document.getElementById("pauseBtn").innerText = "Resume";
  } else {
    isPaused = false;

    const pauseDur = Date.now() - pausedAt;
    phaseStartTime += pauseDur;
    workoutStartTime += pauseDur;

    document.getElementById("pauseBtn").innerText = "Pause";
  }
}

// ===== THEME =====
function toggleTheme(){
  document.body.classList.toggle("light");
  document.getElementById("themeBtn").innerText =
    document.body.classList.contains("light") ? "☀️" : "🌙";
}
</script>

<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
