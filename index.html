<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Timer</title>
<link rel="manifest" href="manifest.json">

<style>
:root {
  --bg:#121212;
  --text:#ffffff;
}

body.light {
  --bg:#ffffff;
  --text:#000000;
}

body {
  font-family: Arial;
  text-align:center;
  padding:20px;
  background:var(--bg);
  color:var(--text);
}
.timer { font-size:3em; margin:20px; }
button { padding:10px 20px; margin:5px; }
button:disabled { opacity:0.4; }
</style>
</head>

<body>

<h1>My Workout Routine</h1>

<div id="phase">READY</div>
<div id="exercise">Ready</div>
<div class="timer" id="timer">00:00</div>

<div id="total">Total: 00:00</div>

<button onclick="start()" id="startBtn">Start</button>
<button onclick="pause()" id="pauseBtn">Pause</button>
<button onclick="toggleTheme()" id="themeBtn">🌙</button>

<div id="settingsPanel" style="margin-top:10px;">

  <label>Warmup Time (sec):</label>
  <input id="timeInput" type="number" value="30" min="5" max="300">

  <button onclick="resetDefault()">Reset</button>

  <br><br>

  <label>
    <input type="checkbox" id="countdownToggle" checked>
    Enable 5–4–3–2–1 Countdown
  </label>

</div>

<script>

/* =========================
   SINGLE SOURCE OF TRUTH
========================= */

const state = {
  running: false,
  paused: false,
  countdownActive: false,
  useCountdown: true,
  index: 0,

  phaseStart: 0,
  phaseDuration: 0
};

let loop = null;

function setInputLock(locked){

  document.getElementById("timeInput").disabled = locked;
  document.getElementById("countdownToggle").disabled = locked;

}

function runPreCountdown(callback){

  const steps = ["5","4","3","2","1"];
  let i = 0;

  state.countdownActive = true;

  document.getElementById("phase").innerText = "GET READY";

  const countdown = setInterval(() => {
    document.getElementById("timer").innerText = steps[i];

    i++;

    if(i >= steps.length){
      clearInterval(countdown);
      state.countdownActive = false;
      callback();
    }

  }, 1000);
}

function resetDefault(){
  document.getElementById("timeInput").value = 30;
}

/* =========================
   WORKOUT DATA
========================= */

const workout = [
  { name: "Jumping Jacks", time: 30 },
  { name: "High Knees", time: 30 },
  { name: "Twists", time: 30 },
  { name: "Squats", time: 30 }
];

/* =========================
   UI HELPERS
========================= */

function updateUI(){
  document.getElementById("exercise").innerText =
    workout[state.index]?.name || "Done";
}

function updateButton(){
  document.getElementById("startBtn").innerText =
    state.running ? "Stop" : "Start";

  document.getElementById("pauseBtn").innerText =
    state.paused ? "Resume" : "Pause";
}

/* =========================
   START / STOP
========================= */

function start(){
  
  setInputLock(true);
  
  state.useCountdown = document.getElementById("countdownToggle").checked;

  if(state.running){
    stop();
    return;
  }

  state.running = true;
  state.paused = false;
  state.index = 0;

  state.index = 0;

runPreCountdown(() => {
  startExercise();
});
  const customTime = parseInt(document.getElementById("timeInput").value) || 30;

  updateUI();
  updateButton();

  loop = setInterval(tick, 100);
}

function stop(){
  
  setInputLock(false);

  state.running = false;
  state.paused = false;
  state.index = 0;

  clearInterval(loop);
  loop = null;

  document.getElementById("timer").innerText = "00:00";
  document.getElementById("exercise").innerText = "Ready";

  updateButton();
}

/* =========================
   PAUSE
========================= */

function pause(){

  if(!state.running) return;

  state.paused = !state.paused;

  if(state.paused){
    clearInterval(loop);
    loop = null;

    // store remaining time
    state.remaining = state.phaseDuration - (Date.now() - state.phaseStart);
  } 
  else {
    // RESUME WITHOUT RESETTING TIMER
    state.phaseStart = Date.now() - (state.phaseDuration - state.remaining);

    loop = setInterval(tick, 100);
  }

  updateButton();
}

function startExercise(){

  const customTime =
    parseInt(document.getElementById("timeInput").value) || 30;

  const beginExercise = () => {

    state.phase = "exercise";
    state.phaseStart = Date.now();
    state.phaseDuration = customTime * 1000;

    document.getElementById("phase").innerText = "WARMUP";
    document.getElementById("exercise").innerText =
      workout[state.index].name;
  };

  // ALWAYS SKIP COUNTDOWN ON FIRST EXERCISE
  if(state.index === 0){
    beginExercise();
    return;
  }

  // CONDITIONAL COUNTDOWN FOR ALL OTHER EXERCISES
  if(state.useCountdown){
    runPreCountdown(beginExercise);
  } else {
    beginExercise();
  }
}

/* =========================
   MAIN LOOP
========================= */

function tick(){
  
  if(state.countdownActive) return;

  if(!state.running || state.paused) return;

  const now = Date.now();
  const remaining = state.phaseDuration - (now - state.phaseStart);

  const sec = Math.max(0, Math.ceil(remaining / 1000));

  document.getElementById("timer").innerText =
    `00:${String(sec).padStart(2,'0')}`;

  updateUI();

  if(remaining <= 0){

  state.index++;

  if(state.index >= workout.length){
    stop();
    return;
  }

  startExercise();
}
}

/* =========================
   INIT
========================= */

updateButton();

function toggleTheme(){
  document.body.classList.toggle("light");
}

</script>

</body>
</html>
