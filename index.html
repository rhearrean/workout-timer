<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Timer</title>

<style>
:root {
  --bg:#121212;
  --text:#fff;
}

body.light {
  --bg:#fff;
  --text:#000;
}

body {
  font-family: Arial;
  text-align:center;
  padding:20px;
  background:var(--bg);
  color:var(--text);
}

.timer { font-size:3em; margin:20px; }

button {
  padding:10px 20px;
  margin:5px;
}

button:disabled {
  opacity:0.4;
}

#panel {
  margin-top:15px;
  padding:10px;
  border:1px solid #333;
  border-radius:8px;
}
</style>
</head>

<body>

<h1>Workout</h1>

<div id="phase">READY</div>
<div id="exercise">Ready</div>

<div class="timer" id="timer">00:00</div>
<div id="totalTime">Total: 00:00</div>

<button onclick="start()" id="startBtn">Start</button>
<button onclick="pause()" id="pauseBtn">Pause</button>
<button onclick="toggleTheme()">🌙</button>

<div id="panel">
  <h3>Settings</h3>

  <div>
    <label>Warmup Time (sec):</label>
    <input id="timeInput" type="number" value="30" min="5" max="300">
  </div>

  <div style="margin-top:10px;">
    <label>
      <input type="checkbox" id="countdownToggle" checked>
      Enable 5–4–3–2–1 Countdown
    </label>
  </div>

  <button onclick="resetDefaults()">Reset</button>
</div>

<script>

/* =========================
   DATA
========================= */

const workout = [
  { name:"Jumping Jacks" },
  { name:"High Knees" },
  { name:"Twists" },
  { name:"Squats" }
];

/* =========================
   STATE MACHINE
========================= */

const state = {
  mode: "idle",

  index: 0,

  phaseStart: 0,
  phaseDuration: 0,

  pausedAt: 0,
  remaining: 0,

  countdownSteps: ["5","4","3","2","1"]
};

/* =========================
   GLOBAL TIMERS
========================= */

let loop = null;

/* =========================
   TOTAL TIMER (ISOLATED)
========================= */

let totalStart = 0;
let totalPaused = 0;

/* =========================
   FORMAT
========================= */

function format(sec){
  const m = Math.floor(sec/60);
  const s = sec % 60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

/* =========================
   TOTAL TIMER FUNCTION (CLEAN)
========================= */

function getTotalTime(){

  if(!totalStart) return 0;

  return Math.floor(
    (Date.now() - totalStart - totalPaused) / 1000
  );
}

/* =========================
   UI
========================= */

function render(){

  document.getElementById("exercise").innerText =
    workout[state.index]?.name || "Done";

  document.getElementById("startBtn").innerText =
    state.mode === "exercise" ? "Stop" : "Start";

  document.getElementById("pauseBtn").innerText =
    state.mode === "paused" ? "Resume" : "Pause";
}

/* =========================
   COUNTDOWN (TIME-BASED, NO DRIFT)
========================= */

function runCountdown(done){

  state.mode = "countdown";

  const start = Date.now();

  const steps = ["5","4","3","2","1"];

  const c = setInterval(() => {

    const step = Math.floor((Date.now() - start) / 1000);

    if(step >= steps.length){
      clearInterval(c);
      done();
      return;
    }

    document.getElementById("timer").innerText =
      steps[step];

  }, 50);
}

/* =========================
   START
========================= */

function start(){

  if(loop) clearInterval(loop);

  state.mode = "countdown";
  state.index = 0;

  totalStart = 0;
  totalPaused = 0;

  loop = setInterval(tick, 100);

  runCountdown(() => startExercise());

  render();
}

/* =========================
   STOP
========================= */

function stop(){

  state.mode = "idle";

  clearInterval(loop);
  loop = null;

  state.index = 0;

  totalStart = 0;
  totalPaused = 0;

  document.getElementById("timer").innerText = "00:00";
  document.getElementById("totalTime").innerText = "Total: 00:00";

  render();
}

/* =========================
   PAUSE / RESUME
========================= */

function pause(){

  if(state.mode === "paused"){
    totalPaused += Date.now() - state.pausedAt;
    state.phaseStart = Date.now() - state.remaining;
    state.mode = "exercise";
  } else {
    state.pausedAt = Date.now();
    state.remaining =
      state.phaseDuration - (Date.now() - state.phaseStart);
    state.mode = "paused";
  }

  render();
}

/* =========================
   START EXERCISE
========================= */

function startExercise(){

  const time =
    parseInt(document.getElementById("timeInput").value) || 30;

  state.mode = "exercise";

  state.phaseStart = Date.now();
  state.phaseDuration = time * 1000;

  document.getElementById("phase").innerText = "WARMUP";

  // ✅ TOTAL TIMER STARTS ONLY HERE (KEY FIX)
  if(totalStart === 0){
    totalStart = Date.now();
  }

  render();
}

/* =========================
   MAIN LOOP
========================= */

function tick(){

  if(state.mode !== "exercise") return;

  const now = Date.now();

  const remaining =
    state.phaseDuration - (now - state.phaseStart);

  const sec = Math.max(0, Math.ceil(remaining/1000));

  document.getElementById("timer").innerText =
    `00:${String(sec).padStart(2,'0')}`;

  /* TOTAL TIME (FULLY ISOLATED) */
  document.getElementById("totalTime").innerText =
    `Total: ${format(getTotalTime())}`;

  /* NEXT EXERCISE */
  if(remaining <= 0){

    state.index++;

    if(state.index >= workout.length){
      stop();
      return;
    }

    runCountdown(() => startExercise());
  }
}

/* =========================
   SETTINGS
========================= */

function resetDefaults(){
  document.getElementById("timeInput").value = 30;
  document.getElementById("countdownToggle").checked = true;
}

function toggleTheme(){
  document.body.classList.toggle("light");
}

render();

</script>

</body>
</html>
